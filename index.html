<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tide Focus</title>
  <link rel="icon"
    href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><circle cx='16' cy='16' r='15' fill='%230a1628'/><path d='M3 18 Q8 12 13 16 T23 14 T31 17' stroke='%232abfbf' stroke-width='2' fill='none'/><path d='M1 22 Q7 16 14 20 T26 17 T32 21' stroke='%231a7a8a' stroke-width='1.5' fill='none' opacity='.7'/></svg>"
    type="image/svg+xml">
  <link
    href="https://fonts.googleapis.com/css2?family=Cormorant+Garant:ital,wght@0,300;0,400;0,600;1,300&family=DM+Sans:wght@300;400;500&display=swap"
    rel="stylesheet">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <style>
    :root {
      --deep: #0a1628;
      --abyss: #061020;
      --midnight: #0d2240;
      --ocean: #0e4d6e;
      --teal: #1a7a8a;
      --seafoam: #2abfbf;
      --foam: #7ee8e8;
      --sand: #c8e8e0;
      --pearl: #e8f6f5;
      --glow: rgba(42, 191, 191, 0.15);
      --glow-strong: rgba(42, 191, 191, 0.35);
      --glass: rgba(10, 40, 70, 0.55);
      --glass-border: rgba(42, 191, 191, 0.18);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--abyss);
      color: var(--pearl);
      min-height: 100vh;
      overflow-x: hidden;
      position: relative;
    }

    /* Ocean background */
    .ocean-bg {
      position: fixed;
      inset: 0;
      z-index: 0;
      background: radial-gradient(ellipse at 20% 0%, #0e3d5e 0%, transparent 60%),
        radial-gradient(ellipse at 80% 100%, #0a2a45 0%, transparent 60%),
        radial-gradient(ellipse at 50% 50%, #061828 0%, #030c18 100%);
    }

    /* Animated bioluminescent particles */
    .particles {
      position: fixed;
      inset: 0;
      z-index: 1;
      overflow: hidden;
      pointer-events: none;
    }

    .particle {
      position: absolute;
      border-radius: 50%;
      background: var(--seafoam);
      opacity: 0;
      animation: float-up linear infinite;
    }

    @keyframes float-up {
      0% {
        transform: translateY(110vh) scale(0);
        opacity: 0;
      }

      10% {
        opacity: 0.6;
      }

      90% {
        opacity: 0.2;
      }

      100% {
        transform: translateY(-10vh) scale(1.5);
        opacity: 0;
      }
    }

    /* Wave layers */
    .waves {
      position: fixed;
      bottom: 0;
      left: 0;
      width: 100%;
      z-index: 1;
      pointer-events: none;
    }

    .wave {
      position: absolute;
      bottom: 0;
      left: 0;
      width: 200%;
      height: 120px;
      border-radius: 50% 50% 0 0 / 80px 80px 0 0;
      animation: wave-move linear infinite;
    }

    .wave-1 {
      background: rgba(14, 77, 110, 0.25);
      height: 100px;
      animation-duration: 8s;
    }

    .wave-2 {
      background: rgba(26, 122, 138, 0.18);
      height: 130px;
      animation-duration: 12s;
      animation-direction: reverse;
    }

    .wave-3 {
      background: rgba(42, 191, 191, 0.06);
      height: 80px;
      animation-duration: 6s;
    }

    @keyframes wave-move {
      0% {
        transform: translateX(0);
      }

      100% {
        transform: translateX(-50%);
      }
    }

    /* Main layout */
    .app {
      position: relative;
      z-index: 10;
      min-height: 100vh;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 2rem;
      padding: 2.5rem;
      max-width: 1100px;
      margin: 0 auto;
      align-items: start;
    }

    /* Header */
    header {
      grid-column: 1 / -1;
      text-align: center;
      padding-bottom: 1rem;
    }

    .logo {
      font-family: 'Cormorant Garant', serif;
      font-size: 2.8rem;
      font-weight: 300;
      letter-spacing: 0.12em;
      color: var(--foam);
      text-shadow: 0 0 40px rgba(126, 232, 232, 0.4);
    }

    .logo span {
      font-style: italic;
      color: var(--seafoam);
    }

    .tagline {
      font-size: 0.8rem;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: var(--teal);
      margin-top: 0.3rem;
      font-weight: 300;
    }

    /* Glass card */
    .card {
      background: rgba(10, 40, 70, 0.78);
      border: 1px solid var(--glass-border);
      border-radius: 24px;
      padding: 2rem;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4), inset 0 1px 0 rgba(126, 232, 232, 0.08);
    }

    .card-title {
      font-family: 'Cormorant Garant', serif;
      font-size: 1.1rem;
      font-weight: 300;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--seafoam);
      margin-bottom: 1.5rem;
      display: flex;
      align-items: center;
      gap: 0.6rem;
    }

    .card-title::before {
      content: '';
      display: inline-block;
      width: 20px;
      height: 1px;
      background: var(--seafoam);
      opacity: 0.5;
    }

    /* Timer section */
    .timer-card {
      position: relative;
      overflow: hidden;
    }

    .timer-card::after {
      content: '';
      position: absolute;
      top: -60px;
      right: -60px;
      width: 200px;
      height: 200px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(42, 191, 191, 0.08) 0%, transparent 70%);
      pointer-events: none;
    }

    /* Phase indicator */
    .phase-badge {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.3rem 1rem;
      border-radius: 100px;
      font-size: 0.72rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      font-weight: 500;
      margin-bottom: 1.8rem;
      transition: all 0.5s ease;
    }

    .phase-badge.work {
      background: rgba(42, 191, 191, 0.15);
      border: 1px solid rgba(42, 191, 191, 0.3);
      color: var(--seafoam);
    }

    .phase-badge.break {
      background: rgba(14, 200, 140, 0.12);
      border: 1px solid rgba(14, 200, 140, 0.3);
      color: #5eeab0;
    }

    .phase-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      animation: pulse-dot 2s ease-in-out infinite;
    }

    .work .phase-dot {
      background: var(--seafoam);
    }

    .break .phase-dot {
      background: #5eeab0;
    }

    @keyframes pulse-dot {

      0%,
      100% {
        transform: scale(1);
        opacity: 1;
      }

      50% {
        transform: scale(1.5);
        opacity: 0.5;
      }
    }

    /* Circular timer */
    .timer-ring-wrap {
      display: flex;
      justify-content: center;
      align-items: center;
      margin: 0.5rem 0 2rem;
      position: relative;
    }

    .timer-ring-wrap::before {
      content: '';
      position: absolute;
      width: 260px;
      height: 260px;
      border-radius: 50%;
      background: radial-gradient(circle,
          rgba(42, 191, 191, 0.06) 0%,
          rgba(42, 191, 191, 0.02) 50%,
          transparent 70%);
    }

    @keyframes ripple-glow {

      0%,
      100% {
        transform: scale(0.95);
        opacity: 0.7;
      }

      50% {
        transform: scale(1.05);
        opacity: 1;
      }
    }

    .timer-ring {
      transform: rotate(-90deg);
      overflow: visible;
    }

    /* Outer decorative ripple rings */
    .ring-ripple {
      fill: none;
      stroke: rgba(42, 191, 191, 0.06);
      stroke-width: 1;
    }

    .ring-ripple-1 {
      animation: ocean-ripple 6s ease-in-out infinite;
    }

    .ring-ripple-2 {
      animation: ocean-ripple 6s ease-in-out 2s infinite;
    }

    .ring-ripple-3 {
      animation: ocean-ripple 6s ease-in-out 4s infinite;
    }

    @keyframes ocean-ripple {
      0% {
        stroke-opacity: 0;
        transform: scale(0.92);
      }

      30% {
        stroke-opacity: 0.12;
      }

      100% {
        stroke-opacity: 0;
        transform: scale(1.15);
      }
    }

    /* Main track — wavy dashed circle */
    .ring-track {
      fill: none;
      stroke: rgba(42, 191, 191, 0.10);
      stroke-width: 3;
      stroke-dasharray: 8 4;
    }

    /* Inner glow ring */
    .ring-inner-glow {
      fill: none;
      stroke: rgba(42, 191, 191, 0.04);
      stroke-width: 12;
    }

    /* Progress arc */
    .ring-progress {
      fill: none;
      stroke: var(--seafoam);
      stroke-width: 3.5;
      stroke-linecap: round;
      stroke-dasharray: 8 4;
      transition: stroke-dashoffset 1s linear, stroke 0.5s;
    }

    .ring-progress.break-ring {
      stroke: #5eeab0;
    }

    .timer-center {
      position: absolute;
      text-align: center;
    }

    .timer-display {
      font-family: 'Cormorant Garant', serif;
      font-size: 4rem;
      font-weight: 300;
      letter-spacing: 0.05em;
      line-height: 1;
      color: var(--pearl);
      text-shadow: 0 0 30px rgba(126, 232, 232, 0.3);
      background: transparent;
      border: none;
      outline: none;
      width: 160px;
      text-align: center;
      cursor: text;
      caret-color: var(--seafoam);
    }

    .timer-display:focus {
      text-shadow: 0 0 30px rgba(126, 232, 232, 0.6);
      border-bottom: 1px solid rgba(42, 191, 191, 0.35);
    }

    .timer-label {
      font-size: 0.65rem;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: var(--teal);
      margin-top: 0.4rem;
    }

    /* Timer controls */
    .timer-controls {
      display: flex;
      gap: 0.75rem;
      justify-content: center;
      margin-bottom: 1.8rem;
    }

    .btn {
      border: none;
      cursor: pointer;
      font-family: 'DM Sans', sans-serif;
      font-weight: 500;
      letter-spacing: 0.08em;
      border-radius: 100px;
      transition: all 0.2s ease;
    }

    .btn-primary {
      background: linear-gradient(135deg, var(--teal), var(--seafoam));
      color: var(--deep);
      padding: 0.75rem 2.5rem;
      font-size: 0.85rem;
      text-transform: uppercase;
      letter-spacing: 0.15em;
      box-shadow: 0 4px 20px rgba(42, 191, 191, 0.3);
    }

    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 28px rgba(42, 191, 191, 0.45);
    }

    .btn-secondary {
      background: rgba(42, 191, 191, 0.1);
      color: var(--seafoam);
      border: 1px solid var(--glass-border);
      padding: 0.75rem 1.5rem;
      font-size: 0.85rem;
      text-transform: uppercase;
      letter-spacing: 0.12em;
    }

    .btn-secondary:hover {
      background: rgba(42, 191, 191, 0.18);
      transform: translateY(-1px);
    }

    /* Settings */
    .settings-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0.75rem;
    }

    .setting-group label {
      display: block;
      font-size: 0.68rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--teal);
      margin-bottom: 0.4rem;
    }

    .setting-group input[type="number"] {
      width: 100%;
      background: rgba(10, 40, 70, 0.6);
      border: 1px solid var(--glass-border);
      border-radius: 10px;
      padding: 0.55rem 0.85rem;
      color: var(--pearl);
      font-family: 'Cormorant Garant', serif;
      font-size: 1.3rem;
      font-weight: 300;
      text-align: center;
      outline: none;
      transition: border-color 0.2s;
    }

    .setting-group input[type="number"]:focus {
      border-color: rgba(42, 191, 191, 0.4);
      box-shadow: 0 0 0 3px rgba(42, 191, 191, 0.08);
    }

    input[type="number"]::-webkit-inner-spin-button,
    input[type="number"]::-webkit-outer-spin-button {
      opacity: 0.3;
    }

    /* Session count */
    .sessions-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-top: 1rem;
      padding-top: 1rem;
      border-top: 1px solid rgba(42, 191, 191, 0.08);
    }

    .sessions-label {
      font-size: 0.7rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--teal);
    }

    .sessions-dots {
      display: flex;
      gap: 6px;
    }

    .session-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: rgba(42, 191, 191, 0.15);
      border: 1px solid rgba(42, 191, 191, 0.25);
      transition: all 0.3s;
    }

    .session-dot.done {
      background: var(--seafoam);
      box-shadow: 0 0 8px rgba(42, 191, 191, 0.5);
    }

    /* Task list */
    .tasks-card {
      align-self: start;
    }

    .tasks-list {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 0.6rem;
    }

    .task-item {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      padding: 0.75rem 1rem;
      background: rgba(6, 24, 48, 0.5);
      border: 1px solid rgba(42, 191, 191, 0.08);
      border-radius: 12px;
      transition: all 0.25s ease;
      animation: task-slide-in 0.3s ease;
    }

    @keyframes task-slide-in {
      from {
        opacity: 0;
        transform: translateY(-8px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .task-item:hover {
      border-color: rgba(42, 191, 191, 0.2);
      background: rgba(14, 50, 80, 0.5);
    }

    .task-item.completed {
      opacity: 0.45;
    }

    /* Custom checkbox */
    .task-check {
      appearance: none;
      -webkit-appearance: none;
      width: 20px;
      height: 20px;
      border-radius: 6px;
      border: 1.5px solid rgba(42, 191, 191, 0.35);
      background: transparent;
      cursor: pointer;
      flex-shrink: 0;
      position: relative;
      transition: all 0.2s;
    }

    .task-check:checked {
      background: linear-gradient(135deg, var(--teal), var(--seafoam));
      border-color: transparent;
    }

    .task-check:checked::after {
      content: '✓';
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      color: var(--deep);
      font-size: 11px;
      font-weight: 700;
      line-height: 1;
    }

    .task-check:hover:not(:checked) {
      border-color: var(--seafoam);
      background: rgba(42, 191, 191, 0.08);
    }

    .task-input {
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      color: var(--pearl);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.9rem;
      font-weight: 300;
    }

    .task-input::placeholder {
      color: rgba(200, 232, 224, 0.25);
    }

    .task-item.completed .task-input {
      text-decoration: line-through;
      text-decoration-color: rgba(42, 191, 191, 0.4);
    }

    .btn-remove {
      background: none;
      border: none;
      cursor: pointer;
      color: rgba(42, 191, 191, 0.2);
      font-size: 1.1rem;
      line-height: 1;
      padding: 2px 4px;
      border-radius: 4px;
      transition: all 0.2s;
      flex-shrink: 0;
    }

    .btn-remove:hover {
      color: #ff6b8a;
      background: rgba(255, 107, 138, 0.1);
    }

    /* Add task button */
    .btn-add-task {
      width: 100%;
      margin-top: 0.6rem;
      padding: 0.65rem;
      background: rgba(42, 191, 191, 0.05);
      border: 1px dashed rgba(42, 191, 191, 0.2);
      border-radius: 12px;
      color: rgba(42, 191, 191, 0.5);
      font-size: 0.8rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      cursor: pointer;
      font-family: 'DM Sans', sans-serif;
      transition: all 0.2s;
    }

    .btn-add-task:hover {
      background: rgba(42, 191, 191, 0.1);
      border-color: rgba(42, 191, 191, 0.4);
      color: var(--seafoam);
    }

    /* Task footer row */
    .tasks-footer {
      display: flex;
      gap: 0.5rem;
      margin-top: 0.6rem;
    }

    .tasks-footer .btn-add-task {
      margin-top: 0;
    }

    /* Clear icon button */
    .btn-clear-icon {
      width: 32px;
      height: 32px;
      padding: 0;
      background: rgba(42, 191, 191, 0.06);
      border: 1px solid rgba(42, 191, 191, 0.15);
      border-radius: 50%;
      color: var(--teal);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.25s ease;
      flex-shrink: 0;
    }

    .btn-clear-icon:hover {
      background: rgba(255, 107, 138, 0.12);
      border-color: rgba(255, 107, 138, 0.35);
      color: #ff6b8a;
      transform: scale(1.1);
    }

    /* Progress bar on tasks */
    .tasks-progress {
      margin-bottom: 1rem;
      display: flex;
      align-items: center;
      gap: 0.75rem;
    }

    .progress-bar-track {
      flex: 1;
      height: 3px;
      background: rgba(42, 191, 191, 0.1);
      border-radius: 100px;
      overflow: hidden;
    }

    .progress-bar-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--teal), var(--seafoam));
      border-radius: 100px;
      transition: width 0.4s ease;
      box-shadow: 0 0 8px rgba(42, 191, 191, 0.4);
    }

    .progress-text {
      font-size: 0.7rem;
      color: var(--teal);
      letter-spacing: 0.1em;
      white-space: nowrap;
      min-width: 32px;
      text-align: right;
    }

    /* Notification toast */
    .toast {
      position: fixed;
      bottom: 2rem;
      left: 50%;
      transform: translateX(-50%) translateY(100px);
      background: rgba(10, 40, 70, 0.9);
      border: 1px solid var(--glass-border);
      border-radius: 100px;
      padding: 0.8rem 2rem;
      font-size: 0.85rem;
      color: var(--foam);
      letter-spacing: 0.05em;
      z-index: 1000;
      transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
      pointer-events: none;
      white-space: nowrap;
    }

    .toast.show {
      transform: translateX(-50%) translateY(0);
    }

    /* Ripple on timer finish */
    .ripple-overlay {
      position: fixed;
      inset: 0;
      z-index: 5;
      pointer-events: none;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      transition: opacity 0.3s;
    }

    .ripple-overlay.active {
      opacity: 1;
    }

    .ripple-circle {
      position: absolute;
      width: 10px;
      height: 10px;
      border-radius: 50%;
      border: 2px solid var(--seafoam);
      animation: ripple-expand 1.5s ease-out forwards;
    }

    @keyframes ripple-expand {
      to {
        transform: scale(200);
        opacity: 0;
      }
    }

    /* Responsive */
    @media (max-width: 700px) {
      .app {
        grid-template-columns: 1fr;
        padding: 1.5rem 1rem;
      }

      header {
        grid-column: 1;
      }

      .timer-display {
        font-size: 3rem;
      }

      .logo {
        font-size: 2rem;
      }
    }

    /* Reduced motion for accessibility & performance */
    @media (prefers-reduced-motion: reduce) {

      .particle,
      .wave,
      .ring-ripple,
      .phase-dot,
      .wave-bars.active span {
        animation: none !important;
      }

      .timer-ring-wrap::before {
        animation: none !important;
      }
    }

    /* Music player */
    .music-player {
      position: fixed;
      top: 1.5rem;
      right: 1.5rem;
      z-index: 100;
      background: rgba(10, 40, 70, 0.85);
      border: 1px solid var(--glass-border);
      border-radius: 20px;
      padding: 0.85rem 1rem;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
      min-width: 210px;
      transition: min-width 0.4s cubic-bezier(0.4, 0, 0.2, 1),
        padding 0.4s cubic-bezier(0.4, 0, 0.2, 1),
        border-radius 0.4s ease;
      overflow: hidden;
    }

    .music-player.minimized {
      min-width: 0;
      padding: 0.55rem 0.85rem;
      border-radius: 100px;
      cursor: pointer;
    }

    .music-header {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.6rem;
      margin-bottom: 0.75rem;
    }

    .music-player.minimized .music-header {
      margin-bottom: 0;
    }

    .music-title {
      font-size: 0.65rem;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: var(--teal);
      white-space: nowrap;
    }

    /* Wave bars animation (visible when minimized & playing) */
    .wave-bars {
      display: flex;
      align-items: flex-end;
      gap: 2px;
      height: 14px;
      opacity: 0.45;
      transition: opacity 0.3s;
      pointer-events: none;
    }

    .wave-bars.active {
      opacity: 1;
    }

    .wave-bars span {
      display: block;
      width: 3px;
      background: var(--seafoam);
      border-radius: 1px;
      transition: transform 0.3s;
    }

    .wave-bars.active span {
      animation: wave-bar 1.2s ease-in-out infinite;
    }

    .wave-bars span:nth-child(1) {
      height: 40%;
      animation-delay: 0s;
    }

    .wave-bars span:nth-child(2) {
      height: 70%;
      animation-delay: 0.15s;
    }

    .wave-bars span:nth-child(3) {
      height: 50%;
      animation-delay: 0.3s;
    }

    .wave-bars span:nth-child(4) {
      height: 80%;
      animation-delay: 0.45s;
    }

    .wave-bars span:nth-child(5) {
      height: 35%;
      animation-delay: 0.6s;
    }

    @keyframes wave-bar {

      0%,
      100% {
        transform: scaleY(0.4);
        opacity: 0.6;
      }

      50% {
        transform: scaleY(1);
        opacity: 1;
      }
    }


    /* Collapsible body */
    .music-body {
      max-height: 400px;
      opacity: 1;
      transition: max-height 0.4s cubic-bezier(0.4, 0, 0.2, 1),
        opacity 0.3s ease,
        margin-top 0.3s ease;
      overflow: hidden;
    }

    .music-player.minimized .music-body {
      max-height: 0;
      opacity: 0;
      margin-top: 0;
    }

    .track-btn.playing {
      background: rgba(42, 191, 191, 0.18);
      border-color: var(--seafoam);
      box-shadow: 0 0 12px rgba(42, 191, 191, 0.15);
    }

    .track-btn.playing .track-icon {
      animation: pulse-dot 2s ease-in-out infinite;
    }

    .track-list {
      display: flex;
      flex-direction: column;
      gap: 0.4rem;
    }

    .track-btn {
      display: flex;
      align-items: center;
      gap: 0.65rem;
      padding: 0.5rem 0.7rem;
      border-radius: 10px;
      border: 1px solid transparent;
      background: transparent;
      cursor: pointer;
      transition: all 0.2s;
      width: 100%;
      text-align: left;
    }

    .track-btn:hover {
      background: rgba(42, 191, 191, 0.08);
      border-color: rgba(42, 191, 191, 0.15);
    }

    .track-btn.active {
      background: rgba(42, 191, 191, 0.12);
      border-color: rgba(42, 191, 191, 0.3);
    }

    .track-icon {
      font-size: 1rem;
      width: 22px;
      text-align: center;
      flex-shrink: 0;
    }

    .track-info {
      flex: 1;
    }

    .track-name {
      font-family: 'DM Sans', sans-serif;
      font-size: 0.78rem;
      color: var(--pearl);
      font-weight: 400;
      display: block;
      line-height: 1.2;
    }

    .track-desc {
      font-size: 0.62rem;
      color: var(--teal);
      letter-spacing: 0.05em;
      display: block;
      margin-top: 1px;
    }

    .track-bar {
      display: flex;
      align-items: center;
      gap: 5px;
      opacity: 0;
      transition: opacity 0.2s;
    }

    .track-bar.visible {
      opacity: 1;
    }

    .track-bar span {
      font-size: 0.6rem;
      color: var(--teal);
    }

    .track-bar input[type=range] {
      -webkit-appearance: none;
      appearance: none;
      width: 60px;
      height: 2px;
      background: rgba(42, 191, 191, 0.2);
      border-radius: 100px;
      outline: none;
      cursor: pointer;
    }

    .track-bar input[type=range]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: var(--seafoam);
      cursor: pointer;
    }

    .vol-row {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      margin-top: 0.7rem;
      padding-top: 0.65rem;
      border-top: 1px solid rgba(42, 191, 191, 0.08);
    }

    .vol-row label {
      font-size: 0.62rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--teal);
    }

    .vol-row input[type=range] {
      -webkit-appearance: none;
      appearance: none;
      flex: 1;
      height: 3px;
      background: rgba(42, 191, 191, 0.2);
      border-radius: 100px;
      outline: none;
      cursor: pointer;
    }

    .vol-row input[type=range]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: var(--seafoam);
      cursor: pointer;
      box-shadow: 0 0 6px rgba(42, 191, 191, 0.5);
    }

    @media (max-width: 700px) {
      .music-player {
        position: static;
        margin: 0.5rem auto 0;
        width: fit-content;
      }
    }

    /* ─── Free Notes Section ──────────────────────────────────────────────────── */
    .notes-section {
      position: relative;
      z-index: 10;
      max-width: 1100px;
      margin: 0 auto;
      padding: 0 2.5rem 2.5rem;
    }

    .notes-card {
      background: rgba(10, 40, 70, 0.78);
      border: 1px solid var(--glass-border);
      border-radius: 24px;
      padding: 2rem;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4), inset 0 1px 0 rgba(126, 232, 232, 0.08);
    }

    /* Tabs bar - vertical sidebar on right */
    .notes-content-area {
      display: flex;
      gap: 0.75rem;
    }

    .notes-main {
      flex: 1;
      min-width: 0;
    }

    .notes-tabs-bar {
      display: flex;
      flex-direction: column;
      align-items: stretch;
      gap: 0.4rem;
      padding: 0.5rem;
      width: 120px;
      flex-shrink: 0;
      overflow-y: auto;
      max-height: 480px;
      scrollbar-width: thin;
      scrollbar-color: rgba(42, 191, 191, 0.15) transparent;
      background: rgba(6, 24, 48, 0.3);
      border-radius: 14px;
      border: 1px solid rgba(42, 191, 191, 0.08);
    }

    .notes-tabs-bar::-webkit-scrollbar {
      width: 4px;
    }

    .notes-tabs-bar::-webkit-scrollbar-thumb {
      background: rgba(42, 191, 191, 0.15);
      border-radius: 100px;
    }

    .notes-tab {
      display: flex;
      align-items: center;
      gap: 0.35rem;
      padding: 0.45rem 0.65rem;
      border-radius: 10px;
      border: 1px solid rgba(42, 191, 191, 0.12);
      background: rgba(6, 24, 48, 0.5);
      color: var(--teal);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.7rem;
      letter-spacing: 0.05em;
      cursor: pointer;
      transition: all 0.2s;
      white-space: nowrap;
      overflow: hidden;
    }

    .notes-tab:hover {
      border-color: rgba(42, 191, 191, 0.3);
      background: rgba(14, 50, 80, 0.5);
    }

    .notes-tab.active {
      background: rgba(42, 191, 191, 0.12);
      border-color: rgba(42, 191, 191, 0.35);
      color: var(--seafoam);
    }

    .notes-tab-label {
      outline: none;
      background: none;
      border: none;
      color: inherit;
      font: inherit;
      letter-spacing: inherit;
      cursor: pointer;
      min-width: 30px;
      text-align: center;
    }

    .notes-tab-label:focus {
      cursor: text;
      border-bottom: 1px solid rgba(42, 191, 191, 0.35);
    }

    .notes-tab-close {
      background: none;
      border: none;
      color: rgba(42, 191, 191, 0.25);
      font-size: 0.9rem;
      cursor: pointer;
      padding: 0 2px;
      line-height: 1;
      transition: color 0.2s;
    }

    .notes-tab-close:hover {
      color: #ff6b8a;
    }

    .btn-add-tab {
      width: 100%;
      height: 28px;
      border-radius: 10px;
      border: 1px dashed rgba(42, 191, 191, 0.25);
      background: transparent;
      color: rgba(42, 191, 191, 0.45);
      font-size: 1rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s;
      flex-shrink: 0;
    }

    .btn-add-tab:hover {
      border-color: rgba(42, 191, 191, 0.5);
      color: var(--seafoam);
      background: rgba(42, 191, 191, 0.08);
    }

    /* Rich text toolbar */
    .notes-toolbar {
      display: flex;
      align-items: center;
      gap: 0.3rem;
      margin-bottom: 0.75rem;
      flex-wrap: wrap;
      padding: 0.5rem 0.6rem;
      border-radius: 14px 14px 0 0;
      background: rgba(6, 24, 48, 0.5);
      border: 1px solid rgba(42, 191, 191, 0.1);
      border-bottom: none;
      max-height: 0;
      opacity: 0;
      overflow: hidden;
      margin-bottom: 0;
      padding: 0 0.6rem;
      transition: max-height 0.35s cubic-bezier(0.4, 0, 0.2, 1),
        opacity 0.25s ease,
        padding 0.35s ease,
        margin-bottom 0.35s ease;
    }

    .notes-toolbar.visible {
      max-height: 120px;
      opacity: 1;
      padding: 0.5rem 0.6rem;
      margin-bottom: 0.75rem;
    }

    /* Ocean toggle button for toolbar */
    .notes-toolbar-toggle {
      position: absolute;
      top: 0.6rem;
      right: 0.6rem;
      width: 38px;
      height: 24px;
      border-radius: 50%/40%;
      border: 1px solid rgba(42, 191, 191, 0.25);
      background: rgba(6, 24, 48, 0.6);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.3s ease;
      z-index: 2;
      padding: 0;
    }

    .notes-toolbar-toggle:hover {
      border-color: rgba(42, 191, 191, 0.5);
      background: rgba(42, 191, 191, 0.1);
      box-shadow: 0 0 12px rgba(42, 191, 191, 0.15);
    }

    .notes-toolbar-toggle.active {
      background: rgba(42, 191, 191, 0.15);
      border-color: rgba(42, 191, 191, 0.4);
    }

    .notes-toolbar-toggle svg {
      width: 22px;
      height: 14px;
    }

    .notes-toolbar .tool-btn {
      padding: 0.35rem 0.55rem;
      border-radius: 8px;
      border: 1px solid transparent;
      background: transparent;
      color: var(--teal);
      font-size: 0.82rem;
      cursor: pointer;
      transition: all 0.2s;
      font-family: 'DM Sans', sans-serif;
      line-height: 1;
      min-width: 30px;
      text-align: center;
    }

    .notes-toolbar .tool-btn:hover {
      border-color: rgba(42, 191, 191, 0.25);
      background: rgba(42, 191, 191, 0.08);
      color: var(--seafoam);
    }

    .notes-toolbar .tool-btn.active {
      background: rgba(42, 191, 191, 0.15);
      border-color: rgba(42, 191, 191, 0.35);
      color: var(--seafoam);
    }

    .notes-toolbar .tool-sep {
      width: 1px;
      height: 20px;
      background: rgba(42, 191, 191, 0.1);
      margin: 0 0.15rem;
    }

    .notes-toolbar select {
      background: rgba(6, 24, 48, 0.6);
      border: 1px solid rgba(42, 191, 191, 0.15);
      border-radius: 8px;
      color: var(--teal);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.72rem;
      padding: 0.3rem 0.5rem;
      cursor: pointer;
      outline: none;
      transition: border-color 0.2s;
    }

    .notes-toolbar select:hover,
    .notes-toolbar select:focus {
      border-color: rgba(42, 191, 191, 0.35);
    }

    .notes-toolbar select option {
      background: #0a1628;
      color: var(--pearl);
    }

    .notes-toolbar input[type="color"] {
      -webkit-appearance: none;
      appearance: none;
      width: 26px;
      height: 26px;
      border: 1px solid rgba(42, 191, 191, 0.2);
      border-radius: 6px;
      background: transparent;
      cursor: pointer;
      padding: 2px;
    }

    .notes-toolbar input[type="color"]::-webkit-color-swatch-wrapper {
      padding: 0;
    }

    .notes-toolbar input[type="color"]::-webkit-color-swatch {
      border: none;
      border-radius: 4px;
    }

    /* Rich text editor area */
    .notes-editor {
      border-radius: 0 0 14px 14px;
      border: 1px solid rgba(42, 191, 191, 0.1);
      border-top: 1px solid rgba(42, 191, 191, 0.06);
      background: rgba(4, 14, 32, 0.5);
      min-height: 380px;
      max-height: 600px;
      overflow-y: auto;
      padding: 1.5rem;
      color: var(--pearl);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.92rem;
      line-height: 1.7;
      outline: none;
      cursor: text;
      scrollbar-width: thin;
      scrollbar-color: rgba(42, 191, 191, 0.15) transparent;
    }

    .notes-editor::-webkit-scrollbar {
      width: 6px;
    }

    .notes-editor::-webkit-scrollbar-thumb {
      background: rgba(42, 191, 191, 0.15);
      border-radius: 100px;
    }

    .notes-editor:focus {
      border-color: rgba(42, 191, 191, 0.2);
    }

    .notes-editor:empty::before {
      content: 'Start writing your notes here...';
      color: rgba(200, 232, 224, 0.2);
      font-style: italic;
      pointer-events: none;
    }

    /* Rich text content styles */
    .notes-editor h1,
    .notes-editor h2,
    .notes-editor h3 {
      font-family: 'Cormorant Garant', serif;
      font-weight: 400;
      color: var(--foam);
      margin: 0.4em 0 0.2em;
    }

    .notes-editor h1 {
      font-size: 1.8rem;
    }

    .notes-editor h2 {
      font-size: 1.4rem;
    }

    .notes-editor h3 {
      font-size: 1.15rem;
    }

    .notes-editor a {
      color: var(--seafoam);
      text-decoration: underline;
      text-decoration-color: rgba(42, 191, 191, 0.4);
    }

    .notes-editor ul,
    .notes-editor ol {
      padding-left: 1.5rem;
      margin: 0.3em 0;
    }

    .notes-editor li {
      margin: 0.15em 0;
    }

    .notes-editor blockquote {
      border-left: 3px solid rgba(42, 191, 191, 0.3);
      padding-left: 1rem;
      margin: 0.5em 0;
      color: rgba(232, 246, 245, 0.7);
      font-style: italic;
    }

    .notes-editor img {
      max-width: 100%;
      border-radius: 12px;
      margin: 0.5rem 0;
      border: 1px solid rgba(42, 191, 191, 0.1);
    }

    .notes-editor hr {
      border: none;
      border-top: 1px solid rgba(42, 191, 191, 0.12);
      margin: 1rem 0;
    }

    /* Hidden file input */
    #notesImageInput {
      display: none;
    }

    @media (max-width: 700px) {
      .notes-section {
        padding: 0 1rem 1.5rem;
      }

      .notes-content-area {
        flex-direction: column;
      }

      .notes-tabs-bar {
        width: 100%;
        max-height: none;
        flex-direction: row;
        overflow-x: auto;
        overflow-y: hidden;
      }

      .notes-editor {
        min-height: 260px;
        padding: 1rem;
      }

      .notes-toolbar {
        gap: 0.2rem;
        padding: 0.4rem;
      }

      .notes-toolbar .tool-btn {
        padding: 0.3rem 0.4rem;
        font-size: 0.75rem;
      }
    }

    #yt-player {
      position: fixed;
      top: -9999px;
      left: -9999px;
      width: 1px;
      height: 1px;
    }
  </style>
</head>

<body>

  <div class="ocean-bg"></div>
  <div class="particles" id="particles"></div>
  <div class="waves">
    <div class="wave wave-1"></div>
    <div class="wave wave-2"></div>
    <div class="wave wave-3"></div>
  </div>

  <div id="yt-player"></div>


  <div class="ripple-overlay" id="ripple"></div>

  <div class="app">
    <header>
      <h1 class="logo">Tide <span>Focus</span></h1>
      <p class="tagline">Flow with the rhythm of the sea</p>

      <div class="music-player minimized" id="musicPlayer">
        <div class="music-header" onclick="toggleSoundscape(event)">
          <span class="music-title">Soundscape</span>
          <div class="wave-bars" id="waveBars">
            <span></span><span></span><span></span><span></span><span></span>
          </div>
        </div>
        <div class="music-body">
          <div class="track-list">
            <!-- Hidden YouTube tracks (kept for later)
            <button class="track-btn" onclick="selectTrack(0)" id="track-0">
              <span class="track-icon">🎵</span>
              <div class="track-info">
                <span class="track-name">Lo-fi Ocean</span>
                <span class="track-desc">YouTube · ambient mix</span>
              </div>
            </button>
            -->
            <button class="track-btn" onclick="selectTrack(1)" id="track-1">
              <span class="track-icon">🌊</span>
              <div class="track-info">
                <span class="track-name">Ocean Waves</span>
                <span class="track-desc">Synthesized · surf &amp; tide</span>
              </div>
            </button>
            <button class="track-btn" onclick="selectTrack(2)" id="track-2">
              <span class="track-icon">🟤</span>
              <div class="track-info">
                <span class="track-name">Brown Noise</span>
                <span class="track-desc">Synthesized · deep focus</span>
              </div>
            </button>
            <button class="track-btn" onclick="selectTrack(3)" id="track-3">
              <span class="track-icon">⚡</span>
              <div class="track-info">
                <span class="track-name">Gamma Waves</span>
                <span class="track-desc">40 Hz · cognitive boost</span>
              </div>
            </button>
            <button class="track-btn" onclick="selectTrack(4)" id="track-4">
              <span class="track-icon">✨</span>
              <div class="track-info">
                <span class="track-name">Limitless</span>
                <span class="track-desc">Generative · never repeats</span>
              </div>
            </button>
            <!-- Hidden YouTube tracks (kept for later)
            <button class="track-btn" onclick="selectTrack(5)" id="track-5">
              <span class="track-icon">🎧</span>
              <div class="track-info">
                <span class="track-name">Lo-fi Beats</span>
                <span class="track-desc">YouTube · chill beats</span>
              </div>
            </button>
            -->
          </div>
          <div class="vol-row">
            <label>Vol</label>
            <input type="range" id="volSlider" min="0" max="100" value="35" oninput="setVolume(this.value)">
          </div>
        </div>
      </div>
    </header>

    <!-- TIMER CARD -->
    <div class="card timer-card">
      <div class="card-title">Pomodoro</div>

      <div class="phase-badge work" id="phaseBadge">
        <span class="phase-dot"></span>
        <span id="phaseText">Deep Work</span>
      </div>

      <div class="timer-ring-wrap">
        <svg class="timer-ring" width="260" height="260" viewBox="0 0 260 260">
          <!-- Inner glow -->
          <circle class="ring-inner-glow" cx="130" cy="130" r="102" />
          <!-- Dashed wave track -->
          <circle class="ring-track" cx="130" cy="130" r="102" />
          <!-- Progress arc -->
          <circle class="ring-progress" id="ringProgress" cx="130" cy="130" r="102" stroke-dasharray="641"
            stroke-dashoffset="0" />
        </svg>
        <div class="timer-center">
          <input class="timer-display" id="timerDisplay" value="25:00" maxlength="5" spellcheck="false"
            onblur="parseDirectEdit(this.value)" onkeydown="if(event.key==='Enter'){this.blur()}"
            onfocus="if(!isRunning)this.select()">
          <div class="timer-label" id="timerLabel">minutes remaining</div>
        </div>
      </div>

      <div class="timer-controls">
        <button class="btn btn-primary" id="startBtn" onclick="toggleTimer()">Start</button>
        <button class="btn btn-secondary" onclick="resetTimer()">Reset</button>
      </div>

      <div class="settings-row">
        <div class="setting-group">
          <label>Work (min)</label>
          <input type="number" id="workMin" value="25" min="1" max="120" onchange="settingChanged()">
        </div>
        <div class="setting-group">
          <label>Break (min)</label>
          <input type="number" id="breakMin" value="5" min="1" max="60" onchange="settingChanged()">
        </div>
      </div>

      <div class="sessions-row">
        <span class="sessions-label">Sessions</span>
        <div class="sessions-dots" id="sessionDots">
          <div class="session-dot"></div>
          <div class="session-dot"></div>
          <div class="session-dot"></div>
          <div class="session-dot"></div>
        </div>
      </div>
    </div>

    <!-- TASKS CARD -->
    <div class="card tasks-card">
      <div class="card-title">Tasks</div>

      <div class="tasks-progress">
        <div class="progress-bar-track">
          <div class="progress-bar-fill" id="progressFill" style="width:0%"></div>
        </div>
        <span class="progress-text" id="progressText">0/4</span>
      </div>

      <ul class="tasks-list" id="tasksList"></ul>
      <div class="tasks-footer">
        <button class="btn-add-task" onclick="addTask()">+ Add task</button>
        <button class="btn-clear-icon" onclick="clearAllTasks()" title="Clear all tasks">
          <svg viewBox="0 0 20 20" width="16" height="16" fill="none">
            <path d="M3 14 Q6 8 10 12 T17 10" stroke="currentColor" stroke-width="1.5" opacity="0.7" />
            <path d="M2 17 Q7 11 12 15 T19 12" stroke="currentColor" stroke-width="1" opacity="0.4" />
            <line x1="4" y1="5" x2="16" y2="5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"
              opacity="0.8" />
            <line x1="10" y1="2" x2="10" y2="5" stroke="currentColor" stroke-width="1" stroke-linecap="round"
              opacity="0.5" />
          </svg>
        </button>
      </div>
    </div>
  </div>

  <!-- FREE NOTES SECTION -->
  <div class="notes-section">
    <div class="notes-card" style="position:relative">
      <div class="card-title">Free Notes</div>
      <button class="btn-clear-all btn-clear-icon" onclick="clearAllNotes()" title="Clear notes"
        style="position:absolute;top:1.5rem;right:2rem">
        <svg viewBox="0 0 20 20" width="18" height="18" fill="none">
          <path d="M3 14 Q6 8 10 12 T17 10" stroke="currentColor" stroke-width="1.5" opacity="0.7" />
          <path d="M2 17 Q7 11 12 15 T19 12" stroke="currentColor" stroke-width="1" opacity="0.4" />
          <line x1="4" y1="5" x2="16" y2="5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"
            opacity="0.8" />
          <line x1="10" y1="2" x2="10" y2="5" stroke="currentColor" stroke-width="1" stroke-linecap="round"
            opacity="0.5" />
        </svg>
      </button>

      <div class="notes-content-area">
        <div class="notes-main" style="position:relative">
          <button class="notes-toolbar-toggle" id="notesToolbarToggle" onclick="toggleNotesToolbar()"
            title="Toggle formatting tools">
            <svg viewBox="0 0 30 16" fill="none">
              <path d="M0 10 Q5 4 10 8 T20 6 T30 9" stroke="var(--seafoam)" stroke-width="1.5" fill="none"
                opacity="0.7" />
              <path d="M0 13 Q7 7 14 11 T28 8" stroke="var(--teal)" stroke-width="1" fill="none" opacity="0.5" />
              <path d="M2 6 Q8 2 15 5 T27 4" stroke="var(--foam)" stroke-width="1" fill="none" opacity="0.35" />
            </svg>
          </button>
          <div class="notes-toolbar" id="notesToolbar">
            <select onchange="notesExec('formatBlock',this.value);this.selectedIndex=0" title="Heading">
              <option value="" disabled selected>Heading</option>
              <option value="h1">Heading 1</option>
              <option value="h2">Heading 2</option>
              <option value="h3">Heading 3</option>
              <option value="p">Paragraph</option>
            </select>
            <div class="tool-sep"></div>
            <button class="tool-btn" onmousedown="event.preventDefault()" onclick="notesExec('bold')"
              title="Bold (⌘B)"><b>B</b></button>
            <button class="tool-btn" onmousedown="event.preventDefault()" onclick="notesExec('italic')"
              title="Italic (⌘I)"><i>I</i></button>
            <button class="tool-btn" onmousedown="event.preventDefault()" onclick="notesExec('underline')"
              title="Underline (⌘U)"><u>U</u></button>
            <button class="tool-btn" onmousedown="event.preventDefault()" onclick="notesExec('strikeThrough')"
              title="Strikethrough"><s>S</s></button>
            <div class="tool-sep"></div>
            <button class="tool-btn" onmousedown="event.preventDefault()" onclick="notesExec('insertUnorderedList')"
              title="Bullet list">•</button>
            <button class="tool-btn" onmousedown="event.preventDefault()" onclick="notesExec('insertOrderedList')"
              title="Numbered list">1.</button>
            <button class="tool-btn" onmousedown="event.preventDefault()" onclick="notesQuote()"
              title="Blockquote">❝</button>
            <div class="tool-sep"></div>
            <button class="tool-btn" onmousedown="event.preventDefault()" onclick="notesInsertLink()"
              title="Insert link">🔗</button>
            <button class="tool-btn" onmousedown="event.preventDefault()" onclick="notesInsertHR()"
              title="Horizontal rule">―</button>
            <button class="tool-btn" onmousedown="event.preventDefault()" onclick="notesAddImage()"
              title="Insert image">🖼</button>
            <div class="tool-sep"></div>
            <input type="color" id="notesColor" value="#e8f6f5" title="Text color"
              onchange="notesExec('foreColor',this.value)">
          </div>

          <div class="notes-editor" id="notesEditor" contenteditable="true" spellcheck="true"
            style="border-radius:14px"></div>
        </div>
        <div class="notes-tabs-bar" id="notesTabsBar"></div>
      </div>
    </div>
  </div>

  <input type="file" id="notesImageInput" accept="image/*" onchange="notesHandleImage(event)">

  <div class="toast" id="toast"></div>

  <script>
    // ─── Timer State ─────────────────────────────────────────────────────────────
    let interval = null;
    let isRunning = false;
    let isWork = true;
    let totalSec = 0;
    let remainSec = 0;
    let sessionsCompleted = 0;
    const CIRCUMFERENCE = 641;

    function getWorkSec() { return parseInt(document.getElementById('workMin').value || 25) * 60; }
    function getBreakSec() { return parseInt(document.getElementById('breakMin').value || 5) * 60; }

    function initTimer() {
      totalSec = isWork ? getWorkSec() : getBreakSec();
      remainSec = totalSec;
      renderTimer();
    }

    function settingChanged() {
      if (!isRunning) initTimer();
    }

    function renderTimer() {
      const m = Math.floor(remainSec / 60).toString().padStart(2, '0');
      const s = (remainSec % 60).toString().padStart(2, '0');
      const el = document.getElementById('timerDisplay');
      if (document.activeElement !== el) el.value = `${m}:${s}`;
      const progress = totalSec > 0 ? (totalSec - remainSec) / totalSec : 0;
      document.getElementById('ringProgress').style.strokeDashoffset = CIRCUMFERENCE * (1 - progress);
      document.title = `${m}:${s} — Tide Focus`;
    }

    function parseDirectEdit(val) {
      if (isRunning) return;
      // Accept MM:SS or plain minutes like "30"
      let m, s;
      const parts = val.split(':');
      if (parts.length === 2) {
        m = parseInt(parts[0]) || 0;
        s = parseInt(parts[1]) || 0;
      } else {
        m = parseInt(parts[0]) || 0;
        s = 0;
      }
      m = Math.min(m, 99); s = Math.min(s, 59);
      remainSec = m * 60 + s;
      totalSec = remainSec;
      renderTimer();
    }

    function toggleTimer() {
      isRunning ? pauseTimer() : startTimer();
    }

    function startTimer() {
      isRunning = true;
      document.getElementById('startBtn').textContent = 'Pause';
      interval = setInterval(tick, 1000);
    }

    function pauseTimer() {
      isRunning = false;
      document.getElementById('startBtn').textContent = 'Resume';
      clearInterval(interval);
    }

    function resetTimer() {
      clearInterval(interval);
      isRunning = false;
      isWork = true;
      document.getElementById('startBtn').textContent = 'Start';
      updatePhaseUI();
      initTimer();
    }

    function tick() {
      remainSec--;
      if (remainSec < 0) {
        timerDone();
        return;
      }
      renderTimer();
    }

    function timerDone() {
      clearInterval(interval);
      isRunning = false;

      if (isWork) {
        playTone('work');
        showToast('🌊 Work session complete — take a breath');
        showRipple();
        sessionsCompleted = Math.min(sessionsCompleted + 1, 4);
        updateSessionDots();
        isWork = false;
        updatePhaseUI();
        totalSec = getBreakSec();
        remainSec = totalSec;
      } else {
        playTone('break');
        showToast('🐚 Break over — dive back in');
        isWork = true;
        updatePhaseUI();
        totalSec = getWorkSec();
        remainSec = totalSec;
      }

      document.getElementById('startBtn').textContent = 'Start';
      renderTimer();
    }

    function updatePhaseUI() {
      const badge = document.getElementById('phaseBadge');
      const text = document.getElementById('phaseText');
      const ring = document.getElementById('ringProgress');
      if (isWork) {
        badge.className = 'phase-badge work';
        text.textContent = 'Deep Work';
        ring.classList.remove('break-ring');
      } else {
        badge.className = 'phase-badge break';
        text.textContent = 'Ocean Break';
        ring.classList.add('break-ring');
      }
    }

    function updateSessionDots() {
      const dots = document.querySelectorAll('.session-dot');
      dots.forEach((dot, i) => {
        dot.classList.toggle('done', i < sessionsCompleted);
      });
    }

    // ─── Tasks ────────────────────────────────────────────────────────────────────
    function loadTasks() {
      try {
        const saved = localStorage.getItem('tideFocusTasks');
        if (saved) {
          const parsed = JSON.parse(saved);
          if (Array.isArray(parsed) && parsed.length > 0) return parsed;
        }
      } catch (e) { /* ignore corrupt data */ }
      return [{ id: 1, text: '', done: false }];
    }

    function saveTasks() {
      try { localStorage.setItem('tideFocusTasks', JSON.stringify(tasks)); } catch (e) { }
    }

    let tasks = loadTasks();
    let nextId = tasks.reduce((max, t) => Math.max(max, t.id), 0) + 1;

    function renderTasks() {
      const list = document.getElementById('tasksList');
      list.innerHTML = '';
      tasks.forEach(t => {
        const li = document.createElement('li');
        li.className = 'task-item' + (t.done ? ' completed' : '');
        li.innerHTML = `
      <input type="checkbox" class="task-check" ${t.done ? 'checked' : ''} onchange="toggleTask(${t.id})">
      <input type="text" class="task-input" placeholder="What's the task?" value="${escHtml(t.text)}"
        oninput="updateTaskText(${t.id}, this.value)"
        onkeydown="taskKeydown(event, ${t.id})">
      <button class="btn-remove" onclick="removeTask(${t.id})" title="Remove task">×</button>
    `;
        list.appendChild(li);
      });
      updateProgress();
      saveTasks();
    }

    function escHtml(s) { return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;'); }

    function updateProgress() {
      const done = tasks.filter(t => t.done).length;
      const total = tasks.length;
      const pct = total > 0 ? Math.round((done / total) * 100) : 0;
      document.getElementById('progressFill').style.width = pct + '%';
      document.getElementById('progressText').textContent = `${done}/${total}`;
    }

    function addTask() {
      tasks.push({ id: nextId++, text: '', done: false });
      renderTasks();
      // Focus last input
      setTimeout(() => {
        const inputs = document.querySelectorAll('.task-input');
        if (inputs.length) inputs[inputs.length - 1].focus();
      }, 50);
    }

    function removeTask(id) {
      if (tasks.length <= 1) { showToast('Need at least one task'); return; }
      tasks = tasks.filter(t => t.id !== id);
      renderTasks();
    }

    function toggleTask(id) {
      const t = tasks.find(t => t.id === id);
      if (t) t.done = !t.done;
      renderTasks();
    }

    function updateTaskText(id, val) {
      const t = tasks.find(tk => tk.id === id);
      if (t) t.text = val;
      updateProgress();
      saveTasks();
    }

    function taskKeydown(e, id) {
      if (e.key === 'Enter') addTask();
      if (e.key === 'Backspace' && e.target.value === '' && tasks.length > 1) {
        removeTask(id);
        setTimeout(() => {
          const inputs = document.querySelectorAll('.task-input');
          if (inputs.length) inputs[inputs.length - 1].focus();
        }, 50);
      }
    }

    function clearAllTasks() {
      if (!confirm('Clear all tasks?')) return;
      tasks = [{ id: nextId++, text: '', done: false }];
      renderTasks();
      showToast('🧹 Tasks cleared');
    }

    // ─── Toast ────────────────────────────────────────────────────────────────────
    let toastTimer;
    function showToast(msg) {
      const el = document.getElementById('toast');
      el.textContent = msg;
      el.classList.add('show');
      clearTimeout(toastTimer);
      toastTimer = setTimeout(() => el.classList.remove('show'), 3500);
    }

    // ─── Ripple effect ────────────────────────────────────────────────────────────
    function showRipple() {
      const el = document.getElementById('ripple');
      el.innerHTML = '<div class="ripple-circle"></div>';
      el.classList.add('active');
      setTimeout(() => el.classList.remove('active'), 1600);
    }

    // ─── Particles ────────────────────────────────────────────────────────────────
    function createParticles() {
      const container = document.getElementById('particles');
      for (let i = 0; i < 4; i++) {
        const p = document.createElement('div');
        p.className = 'particle';
        const size = Math.random() * 4 + 1;
        p.style.cssText = `
      left: ${Math.random() * 100}%;
      width: ${size}px;
      height: ${size}px;
      animation-duration: ${Math.random() * 18 + 14}s;
      animation-delay: ${Math.random() * 20}s;
      opacity: ${Math.random() * 0.5};
    `;
        container.appendChild(p);
      }
    }

    // ─── Audio Engine ─────────────────────────────────────────────────────────────
    let sharedCtx = null;
    function getCtx() {
      if (!sharedCtx) sharedCtx = new (window.AudioContext || window.webkitAudioContext)();
      if (sharedCtx.state === 'suspended') sharedCtx.resume();
      return sharedCtx;
    }

    function makePinkNoiseBuffer(ac) {
      const len = ac.sampleRate * 4;
      const buf = ac.createBuffer(2, len, ac.sampleRate);
      for (let c = 0; c < 2; c++) {
        const d = buf.getChannelData(c);
        let b0 = 0, b1 = 0, b2 = 0, b3 = 0, b4 = 0, b5 = 0, b6 = 0;
        for (let i = 0; i < len; i++) {
          const w = Math.random() * 2 - 1;
          b0 = 0.99886 * b0 + w * 0.0555179; b1 = 0.99332 * b1 + w * 0.0750759;
          b2 = 0.96900 * b2 + w * 0.1538520; b3 = 0.86650 * b3 + w * 0.3104856;
          b4 = 0.55000 * b4 + w * 0.5329522; b5 = -0.7616 * b5 - w * 0.0168980;
          d[i] = (b0 + b1 + b2 + b3 + b4 + b5 + b6 + w * 0.5362) / 7; b6 = w * 0.115926;
        }
      }
      return buf;
    }

    // ── Bell tones for pomodoro alerts ──
    function playTone(type) {
      const ac = getCtx();
      const seq = type === 'work'
        ? [[528, 0], [440, .25], [396, .5], [264, .85]]
        : [[330, 0], [440, .2], [528, .4], [660, .65]];
      seq.forEach(([freq, delay]) => {
        const osc = ac.createOscillator(), g = ac.createGain(), now = ac.currentTime + delay;
        osc.connect(g); g.connect(ac.destination);
        osc.type = 'sine'; osc.frequency.value = freq;
        g.gain.setValueAtTime(0, now);
        g.gain.linearRampToValueAtTime(0.18, now + 0.04);
        g.gain.exponentialRampToValueAtTime(0.001, now + 1.8);
        osc.start(now); osc.stop(now + 2);
      });
    }

    // ─── Multi-track Soundscape ───────────────────────────────────────────────────
    // tracks: 0=youtube(lofi ocean)  1=ocean  2=brown  3=gamma  4=limitless  5=youtube(lofi beats)
    const ytVideoIds = { 0: '4MFOBeUCPkw', 4: '4MFOBeUCPkw', 5: 'jfKfPfyJRdk' };
    let currentTrack = 0;
    let isPlaying = false;
    let activeNodes = [];
    let masterGainNode = null;

    // ── YouTube (track 0) ──
    let ytPlayer = null, ytReady = false;
    let ytApiLoading = false;
    let pendingTrack = -1;  // Track index to auto-play when YouTube becomes ready

    function loadYouTubeAPI() {
      if (ytReady || ytApiLoading) return;
      ytApiLoading = true;
      const ytScript = document.createElement('script');
      ytScript.src = 'https://www.youtube.com/iframe_api';
      document.head.appendChild(ytScript);
    }

    function onYouTubeIframeAPIReady() {
      ytPlayer = new YT.Player('yt-player', {
        videoId: '4MFOBeUCPkw',
        playerVars: { autoplay: 0, loop: 1, playlist: '4MFOBeUCPkw', controls: 0, disablekb: 1, fs: 0 },
        events: {
          onReady: e => {
            ytReady = true;
            e.target.setVolume(getVolPct());
            // Auto-play if a track was pending
            if (pendingTrack >= 0 && isPlaying && ytVideoIds[pendingTrack]) {
              const videoId = ytVideoIds[pendingTrack];
              ytPlayer.loadVideoById({ videoId: videoId, startSeconds: 0 });
              ytPlayer.setVolume(getVolPct());
              pendingTrack = -1;
            }
          },
          onStateChange: e => {
            if (e.data === YT.PlayerState.ENDED && !isPlaying) {
              ytPlayer.pauseVideo();
            }
          }
        }
      });
    }

    // ── Ocean waves (track 1) ──
    function buildOcean(ac, master) {
      const buf = makePinkNoiseBuffer(ac);
      const all = [];

      function layer(loopStart, fType, fFreq, fQ, baseGain, lfoHz, lfoDepth) {
        const src = ac.createBufferSource();
        src.buffer = buf; src.loop = true; src.loopStart = loopStart;
        const filt = ac.createBiquadFilter();
        filt.type = fType; filt.frequency.value = fFreq; filt.Q.value = fQ;
        const g = ac.createGain(); g.gain.value = baseGain;
        src.connect(filt); filt.connect(g); g.connect(master); src.start(); all.push(src);
        if (lfoHz) {
          const lfo = ac.createOscillator(), lg = ac.createGain();
          lfo.frequency.value = lfoHz; lg.gain.value = lfoDepth;
          lfo.connect(lg); lg.connect(g.gain); lfo.start(); all.push(lfo);
        }
      }

      layer(0, 'lowpass', 180, 0.8, 0.5, null, 0);
      layer(0.5, 'bandpass', 600, 0.6, 0.35, 0.13, 0.3);
      layer(1.2, 'highpass', 2800, 0.5, 0.08, 0.09, 0.06);
      layer(2.0, 'lowpass', 80, 1.2, 0.18, 0.07, 0.15);

      return { stop: () => all.forEach(n => { try { n.stop(); } catch (e) { } }) };
    }

    // ── Brown noise (track 2) ──
    function buildBrown(ac, master) {
      const len = ac.sampleRate * 4;
      const buf = ac.createBuffer(2, len, ac.sampleRate);
      for (let c = 0; c < 2; c++) {
        const d = buf.getChannelData(c); let last = 0;
        for (let i = 0; i < len; i++) {
          last = (last + 0.02 * (Math.random() * 2 - 1)) / 1.02;
          d[i] = Math.max(-1, Math.min(1, last * 3.0));
        }
      }
      const src = ac.createBufferSource(); src.buffer = buf; src.loop = true;
      const lp = ac.createBiquadFilter(); lp.type = 'lowpass'; lp.frequency.value = 500; lp.Q.value = 0.5;
      const g = ac.createGain(); g.gain.value = 0.9;
      src.connect(lp); lp.connect(g); g.connect(master); src.start();
      return { stop: () => { try { src.stop(); } catch (e) { } } };
    }

    // ── Gamma 40Hz isochronic (track 3) ──
    function buildGamma(ac, master) {
      const nodes = [];

      function makeIsochronic(carrierFreq, panVal) {
        const osc = ac.createOscillator();
        osc.type = 'sine'; osc.frequency.value = carrierFreq;
        // AM: base=0.5, mod depth=0.5 → gain sweeps [0..1], stays positive
        const ampGain = ac.createGain(); ampGain.gain.value = 0.5;
        const modOsc = ac.createOscillator();
        modOsc.type = 'sine'; modOsc.frequency.value = 40;
        const modDepth = ac.createGain(); modDepth.gain.value = 0.5;
        modOsc.connect(modDepth); modDepth.connect(ampGain.gain);
        const pan = ac.createStereoPanner(); pan.pan.value = panVal;
        osc.connect(ampGain); ampGain.connect(pan); pan.connect(master);
        osc.start(); modOsc.start();
        nodes.push(osc, modOsc);
      }

      makeIsochronic(200, -1);  // 200Hz left
      makeIsochronic(240, 1);  // 240Hz right → 40Hz binaural beat

      // Soft pink noise bed
      const nb = makePinkNoiseBuffer(ac);
      const ns = ac.createBufferSource(); ns.buffer = nb; ns.loop = true;
      const nlp = ac.createBiquadFilter(); nlp.type = 'lowpass'; nlp.frequency.value = 800;
      const ng = ac.createGain(); ng.gain.value = 0.04;
      ns.connect(nlp); nlp.connect(ng); ng.connect(master); ns.start();
      nodes.push(ns);

      return { stop: () => nodes.forEach(n => { try { n.stop(); } catch (e) { } }) };
    }

    // ── Limitless: generative ambient music (track 4) ──
    function buildLimitless(ac, master) {
      const nodes = [];
      let schedulerTimer = null;

      // Simple feedback delay for warmth/space
      const delayNode = ac.createDelay(2.0); delayNode.delayTime.value = 0.45;
      const fbGain = ac.createGain(); fbGain.gain.value = 0.38;
      const delayLp = ac.createBiquadFilter(); delayLp.type = 'lowpass'; delayLp.frequency.value = 1800;
      const wetGain = ac.createGain(); wetGain.gain.value = 0.28;
      delayNode.connect(delayLp); delayLp.connect(fbGain); fbGain.connect(delayNode);
      delayNode.connect(wetGain); wetGain.connect(master);

      // C pentatonic: C D E G A across 3 octaves
      const penta = [
        65.41, 73.42, 82.41, 98.00, 110.00,
        130.81, 146.83, 164.81, 196.00, 220.00,
        261.63, 293.66, 329.63, 392.00, 440.00
      ];

      // Chord voicings (indices into penta)
      const chords = [
        [0, 4, 7], [2, 5, 9], [1, 4, 8], [3, 6, 9], [0, 3, 7], [4, 7, 10], [2, 6, 9]
      ];

      function softNote(freq, dur, when, vol = 0.07, wave = 'sine') {
        const osc = ac.createOscillator(), g = ac.createGain();
        osc.type = wave; osc.frequency.value = freq;
        const atk = Math.min(dur * 0.2, 1.5), rel = Math.min(dur * 0.4, 2.5);
        g.gain.setValueAtTime(0, when);
        g.gain.linearRampToValueAtTime(vol, when + atk);
        g.gain.setValueAtTime(vol, when + dur - rel);
        g.gain.linearRampToValueAtTime(0, when + dur);
        osc.connect(g);
        g.connect(master);
        g.connect(delayNode);
        osc.start(when); osc.stop(when + dur + 0.05);
        nodes.push(osc);
      }

      let nextBeat = ac.currentTime + 0.2;

      function schedule() {
        const lookahead = 4.0; // schedule 4s ahead
        while (nextBeat < ac.currentTime + lookahead) {
          const chord = chords[Math.floor(Math.random() * chords.length)];
          const chordDur = 5 + Math.random() * 6;

          // Pad voices
          chord.forEach((idx, i) => {
            if (idx < penta.length) {
              softNote(penta[idx], chordDur, nextBeat + i * 0.08, 0.055 + Math.random() * 0.02, 'sine');
            }
          });

          // Occasional high melody note
          if (Math.random() > 0.35) {
            const hiIdx = 10 + Math.floor(Math.random() * 5);
            const melDelay = 1 + Math.random() * (chordDur * 0.5);
            softNote(penta[hiIdx], 2 + Math.random() * 2, nextBeat + melDelay, 0.035, 'sine');
          }

          // Rare bass pulse
          if (Math.random() > 0.55) {
            softNote(penta[chord[0]] * 0.5, 3 + Math.random() * 2, nextBeat, 0.07, 'sine');
          }

          nextBeat += chordDur * 0.65 + Math.random() * 2;
        }

        schedulerTimer = setTimeout(schedule, 2000);
      }

      schedule();

      return {
        stop: () => {
          clearTimeout(schedulerTimer);
          nodes.forEach(n => { try { n.stop(); } catch (e) { } });
        }
      };
    }

    // ─── Player Controls ──────────────────────────────────────────────────────────
    function getVolPct() { return parseInt(document.getElementById('volSlider').value); }

    function startCurrentTrack() {
      const ac = getCtx();
      masterGainNode = ac.createGain();
      masterGainNode.gain.setValueAtTime(0, ac.currentTime);
      masterGainNode.gain.linearRampToValueAtTime(getVolPct() / 100 * 0.75, ac.currentTime + 1.5);
      masterGainNode.connect(ac.destination);

      if (ytVideoIds[currentTrack]) {
        const videoId = ytVideoIds[currentTrack];
        loadYouTubeAPI();
        if (ytReady) {
          // Load correct video if different from current
          const currentVideoUrl = ytPlayer.getVideoUrl && ytPlayer.getVideoUrl();
          if (!currentVideoUrl || !currentVideoUrl.includes(videoId)) {
            ytPlayer.loadVideoById({ videoId: videoId, startSeconds: 0 });
          } else {
            ytPlayer.playVideo();
          }
          ytPlayer.setVolume(getVolPct());
        } else {
          pendingTrack = currentTrack;
        }
      } else if (currentTrack === 1) {
        activeNodes.push(buildOcean(ac, masterGainNode));
      } else if (currentTrack === 2) {
        activeNodes.push(buildBrown(ac, masterGainNode));
      } else if (currentTrack === 3) {
        activeNodes.push(buildGamma(ac, masterGainNode));
      }
    }

    function stopCurrentTrack(instant) {
      pendingTrack = -1;
      // Always stop YouTube to prevent audio bleed between tracks
      if (ytReady && ytPlayer) {
        ytPlayer.pauseVideo();
        ytPlayer.seekTo(0, true);
      }
      if (masterGainNode && !instant) {
        const ac = getCtx();
        masterGainNode.gain.linearRampToValueAtTime(0, ac.currentTime + 1.2);
        const captured = [...activeNodes];
        setTimeout(() => { captured.forEach(n => n.stop()); }, 1350);
      } else {
        activeNodes.forEach(n => n.stop());
      }
      activeNodes = [];
      masterGainNode = null;
    }

    function selectTrack(idx) {
      // Clicking the already-playing track stops it
      if (isPlaying && currentTrack === idx) {
        stopCurrentTrack(false);
        isPlaying = false;
        updateTrackUI(-1);
        updateWaveBars();
        return;
      }
      // Remember if we need a cross-fade delay
      const wasBusy = isPlaying;
      if (wasBusy) stopCurrentTrack(false);
      isPlaying = false;
      currentTrack = idx;
      updateTrackUI(idx);

      const delay = wasBusy ? 1400 : 50;
      setTimeout(() => {
        startCurrentTrack();
        isPlaying = true;
        updateWaveBars();
      }, delay);
    }

    function updateTrackUI(activeIdx) {
      document.querySelectorAll('.track-btn').forEach((b, i) => {
        b.classList.toggle('playing', i === activeIdx);
      });
    }

    // ─── Soundscape expand / collapse ────────────────────────────────────────────
    function toggleSoundscape(e) {
      const player = document.getElementById('musicPlayer');
      player.classList.toggle('minimized');
      updateWaveBars();
    }

    function updateWaveBars() {
      const bars = document.getElementById('waveBars');
      bars.classList.toggle('active', isPlaying);
    }

    function setVolume(val) {
      const v = parseInt(val) / 100;
      if (masterGainNode) {
        const ac = getCtx();
        masterGainNode.gain.linearRampToValueAtTime(v * 0.75, ac.currentTime + 0.1);
      }
      if (ytVideoIds[currentTrack] && ytReady && ytPlayer) ytPlayer.setVolume(parseInt(val));
    }
    // ─── Free Notes Engine (Rich Text) ────────────────────────────────────────
    let notesTabs = [];
    let activeTabId = null;
    let notesNextId = 1;
    let notesSaveTimer = null;

    // Load from localStorage
    function loadNotes() {
      try {
        const saved = localStorage.getItem('tideFocusNotes');
        if (saved) {
          const parsed = JSON.parse(saved);
          if (Array.isArray(parsed) && parsed.length > 0) {
            notesNextId = parsed.reduce((max, t) => Math.max(max, t.id), 0) + 1;
            return parsed;
          }
        }
      } catch (e) { }
      return null;
    }

    function saveNotes() {
      try {
        // Save current editor content to the active tab
        const tab = notesTabs.find(t => t.id === activeTabId);
        if (tab) {
          tab.content = document.getElementById('notesEditor').innerHTML;
        }
        localStorage.setItem('tideFocusNotes', JSON.stringify(notesTabs));
      } catch (e) { }
    }

    function debouncedSave() {
      clearTimeout(notesSaveTimer);
      notesSaveTimer = setTimeout(saveNotes, 400);
    }

    // Tab management
    function addNoteTab(name) {
      const tab = {
        id: notesNextId++,
        name: name || 'Note ' + (notesTabs.length + 1),
        content: ''
      };
      notesTabs.push(tab);
      switchNoteTab(tab.id);
      saveNotes();
    }

    function removeNoteTab(id) {
      if (notesTabs.length <= 1) {
        showToast('Need at least one note');
        return;
      }
      notesTabs = notesTabs.filter(t => t.id !== id);
      if (activeTabId === id) {
        switchNoteTab(notesTabs[0].id);
      } else {
        renderNotesTabs();
      }
      saveNotes();
    }

    function switchNoteTab(id) {
      // Save current editor content first
      if (activeTabId !== null) {
        const prev = notesTabs.find(t => t.id === activeTabId);
        if (prev) {
          prev.content = document.getElementById('notesEditor').innerHTML;
        }
      }

      activeTabId = id;
      renderNotesTabs();

      // Restore the new tab's content
      const tab = notesTabs.find(t => t.id === id);
      const editor = document.getElementById('notesEditor');
      editor.innerHTML = tab ? (tab.content || '') : '';
    }

    function renderNotesTabs() {
      const bar = document.getElementById('notesTabsBar');
      bar.innerHTML = '';
      notesTabs.forEach(tab => {
        const div = document.createElement('div');
        div.className = 'notes-tab' + (tab.id === activeTabId ? ' active' : '');

        const label = document.createElement('span');
        label.className = 'notes-tab-label';
        label.spellcheck = false;
        label.textContent = tab.name;

        // Single click on the tab div switches tabs
        div.onclick = (e) => {
          if (tab.id !== activeTabId) {
            switchNoteTab(tab.id);
          }
        };

        // Double-click on label enters rename mode
        label.ondblclick = (e) => {
          e.stopPropagation();
          label.contentEditable = true;
          label.focus();
          // Select all text
          const range = document.createRange();
          range.selectNodeContents(label);
          const sel = window.getSelection();
          sel.removeAllRanges();
          sel.addRange(range);
        };

        label.onblur = () => {
          label.contentEditable = false;
          tab.name = label.textContent.trim() || 'Note';
          saveNotes();
        };
        label.onkeydown = (e) => { if (e.key === 'Enter') { e.preventDefault(); label.blur(); } };

        const close = document.createElement('button');
        close.className = 'notes-tab-close';
        close.innerHTML = '×';
        close.onclick = (e) => { e.stopPropagation(); removeNoteTab(tab.id); };

        div.appendChild(label);
        div.appendChild(close);
        bar.appendChild(div);
      });

      const addBtn = document.createElement('button');
      addBtn.className = 'btn-add-tab';
      addBtn.innerHTML = '+';
      addBtn.title = 'New note';
      addBtn.onclick = () => addNoteTab();
      bar.appendChild(addBtn);
    }

    // Exec command helper
    function notesExec(cmd, val) {
      if (cmd === 'formatBlock' && val) {
        document.execCommand('formatBlock', false, '<' + val + '>');
      } else {
        document.execCommand(cmd, false, val || null);
      }
      document.getElementById('notesEditor').focus();
      debouncedSave();
    }

    function notesInsertLink() {
      const url = prompt('Enter URL:');
      if (url) {
        document.execCommand('createLink', false, url);
        debouncedSave();
      }
    }

    function notesQuote() {
      document.execCommand('formatBlock', false, '<blockquote>');
      document.getElementById('notesEditor').focus();
      debouncedSave();
    }

    function notesInsertHR() {
      document.execCommand('insertHorizontalRule', false, null);
      debouncedSave();
    }

    // Image insertion
    function notesAddImage() {
      document.getElementById('notesImageInput').click();
    }

    function notesHandleImage(e) {
      const file = e.target.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = (ev) => {
        // Insert inline image at cursor or at end
        const editor = document.getElementById('notesEditor');
        editor.focus();
        document.execCommand('insertImage', false, ev.target.result);
        debouncedSave();
      };
      reader.readAsDataURL(file);
      e.target.value = '';
    }

    function toggleNotesToolbar() {
      const toolbar = document.getElementById('notesToolbar');
      const toggle = document.getElementById('notesToolbarToggle');
      const editor = document.getElementById('notesEditor');
      const isVisible = toolbar.classList.toggle('visible');
      toggle.classList.toggle('active', isVisible);
      editor.style.borderRadius = isVisible ? '0 0 14px 14px' : '14px';
    }

    // Paste handler: allow images pasted from clipboard
    function notesHandlePaste(e) {
      const items = (e.clipboardData || e.originalEvent.clipboardData).items;
      for (const item of items) {
        if (item.type.startsWith('image/')) {
          e.preventDefault();
          const blob = item.getAsFile();
          const reader = new FileReader();
          reader.onload = (ev) => {
            document.execCommand('insertImage', false, ev.target.result);
            debouncedSave();
          };
          reader.readAsDataURL(blob);
          return;
        }
      }
      // For non-image paste, let default happen then debounce save
      setTimeout(debouncedSave, 50);
    }

    function clearAllNotes() {
      if (!confirm('Clear all notes? This will delete all tabs.')) return;
      notesTabs = [];
      activeTabId = null;
      addNoteTab('Note 1');
      showToast('🧹 Notes cleared');
    }

    // Init notes
    function initNotes() {
      const saved = loadNotes();
      if (saved) {
        notesTabs = saved;
        activeTabId = notesTabs[0].id;
      } else {
        notesTabs = [];
        addNoteTab('Note 1');
        return; // addNoteTab already renders
      }
      renderNotesTabs();
      const tab = notesTabs.find(t => t.id === activeTabId);
      document.getElementById('notesEditor').innerHTML = tab ? (tab.content || '') : '';
    }

    // Editor event listeners
    const notesEditorEl = document.getElementById('notesEditor');
    notesEditorEl.addEventListener('input', debouncedSave);
    notesEditorEl.addEventListener('paste', notesHandlePaste);


    createParticles();
    initTimer();
    renderTasks();
    initNotes();
  </script>
</body>

</html>
