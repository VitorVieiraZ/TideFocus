<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tide Focus — Pomodoro</title>
  <link
    href="https://fonts.googleapis.com/css2?family=Cormorant+Garant:ital,wght@0,300;0,400;0,600;1,300&family=DM+Sans:wght@300;400;500&display=swap"
    rel="stylesheet">
  <style>
    :root {
      --deep: #0a1628;
      --abyss: #061020;
      --midnight: #0d2240;
      --ocean: #0e4d6e;
      --teal: #1a7a8a;
      --seafoam: #2abfbf;
      --foam: #7ee8e8;
      --sand: #c8e8e0;
      --pearl: #e8f6f5;
      --glow: rgba(42, 191, 191, 0.15);
      --glow-strong: rgba(42, 191, 191, 0.35);
      --glass: rgba(10, 40, 70, 0.55);
      --glass-border: rgba(42, 191, 191, 0.18);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--abyss);
      color: var(--pearl);
      min-height: 100vh;
      overflow-x: hidden;
      position: relative;
    }

    /* Ocean background */
    .ocean-bg {
      position: fixed;
      inset: 0;
      z-index: 0;
      background: radial-gradient(ellipse at 20% 0%, #0e3d5e 0%, transparent 60%),
        radial-gradient(ellipse at 80% 100%, #0a2a45 0%, transparent 60%),
        radial-gradient(ellipse at 50% 50%, #061828 0%, #030c18 100%);
    }

    /* Animated bioluminescent particles */
    .particles {
      position: fixed;
      inset: 0;
      z-index: 1;
      overflow: hidden;
      pointer-events: none;
    }

    .particle {
      position: absolute;
      border-radius: 50%;
      background: var(--seafoam);
      opacity: 0;
      animation: float-up linear infinite;
    }

    @keyframes float-up {
      0% {
        transform: translateY(110vh) scale(0);
        opacity: 0;
      }

      10% {
        opacity: 0.6;
      }

      90% {
        opacity: 0.2;
      }

      100% {
        transform: translateY(-10vh) scale(1.5);
        opacity: 0;
      }
    }

    /* Wave layers */
    .waves {
      position: fixed;
      bottom: 0;
      left: 0;
      width: 100%;
      z-index: 1;
      pointer-events: none;
    }

    .wave {
      position: absolute;
      bottom: 0;
      left: 0;
      width: 200%;
      height: 120px;
      border-radius: 50% 50% 0 0 / 80px 80px 0 0;
      animation: wave-move linear infinite;
    }

    .wave-1 {
      background: rgba(14, 77, 110, 0.25);
      height: 100px;
      animation-duration: 8s;
    }

    .wave-2 {
      background: rgba(26, 122, 138, 0.18);
      height: 130px;
      animation-duration: 12s;
      animation-direction: reverse;
    }

    .wave-3 {
      background: rgba(42, 191, 191, 0.06);
      height: 80px;
      animation-duration: 6s;
    }

    @keyframes wave-move {
      0% {
        transform: translateX(0);
      }

      100% {
        transform: translateX(-50%);
      }
    }

    /* Main layout */
    .app {
      position: relative;
      z-index: 10;
      min-height: 100vh;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 2rem;
      padding: 2.5rem;
      max-width: 1100px;
      margin: 0 auto;
      align-items: start;
    }

    /* Header */
    header {
      grid-column: 1 / -1;
      text-align: center;
      padding-bottom: 1rem;
    }

    .logo {
      font-family: 'Cormorant Garant', serif;
      font-size: 2.8rem;
      font-weight: 300;
      letter-spacing: 0.12em;
      color: var(--foam);
      text-shadow: 0 0 40px rgba(126, 232, 232, 0.4);
    }

    .logo span {
      font-style: italic;
      color: var(--seafoam);
    }

    .tagline {
      font-size: 0.8rem;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: var(--teal);
      margin-top: 0.3rem;
      font-weight: 300;
    }

    /* Glass card */
    .card {
      background: var(--glass);
      border: 1px solid var(--glass-border);
      border-radius: 24px;
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      padding: 2rem;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4), inset 0 1px 0 rgba(126, 232, 232, 0.08);
    }

    .card-title {
      font-family: 'Cormorant Garant', serif;
      font-size: 1.1rem;
      font-weight: 300;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--seafoam);
      margin-bottom: 1.5rem;
      display: flex;
      align-items: center;
      gap: 0.6rem;
    }

    .card-title::before {
      content: '';
      display: inline-block;
      width: 20px;
      height: 1px;
      background: var(--seafoam);
      opacity: 0.5;
    }

    /* Timer section */
    .timer-card {
      position: relative;
      overflow: hidden;
    }

    .timer-card::after {
      content: '';
      position: absolute;
      top: -60px;
      right: -60px;
      width: 200px;
      height: 200px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(42, 191, 191, 0.08) 0%, transparent 70%);
      pointer-events: none;
    }

    /* Phase indicator */
    .phase-badge {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.3rem 1rem;
      border-radius: 100px;
      font-size: 0.72rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      font-weight: 500;
      margin-bottom: 1.8rem;
      transition: all 0.5s ease;
    }

    .phase-badge.work {
      background: rgba(42, 191, 191, 0.15);
      border: 1px solid rgba(42, 191, 191, 0.3);
      color: var(--seafoam);
    }

    .phase-badge.break {
      background: rgba(14, 200, 140, 0.12);
      border: 1px solid rgba(14, 200, 140, 0.3);
      color: #5eeab0;
    }

    .phase-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      animation: pulse-dot 2s ease-in-out infinite;
    }

    .work .phase-dot {
      background: var(--seafoam);
    }

    .break .phase-dot {
      background: #5eeab0;
    }

    @keyframes pulse-dot {

      0%,
      100% {
        transform: scale(1);
        opacity: 1;
      }

      50% {
        transform: scale(1.5);
        opacity: 0.5;
      }
    }

    /* Circular timer */
    .timer-ring-wrap {
      display: flex;
      justify-content: center;
      align-items: center;
      margin: 0.5rem 0 2rem;
      position: relative;
    }

    .timer-ring-wrap::before {
      content: '';
      position: absolute;
      width: 260px;
      height: 260px;
      border-radius: 50%;
      background: radial-gradient(circle,
          rgba(42, 191, 191, 0.06) 0%,
          rgba(42, 191, 191, 0.02) 50%,
          transparent 70%);
      animation: ripple-glow 4s ease-in-out infinite;
    }

    @keyframes ripple-glow {

      0%,
      100% {
        transform: scale(0.95);
        opacity: 0.7;
      }

      50% {
        transform: scale(1.05);
        opacity: 1;
      }
    }

    .timer-ring {
      transform: rotate(-90deg);
      filter: drop-shadow(0 0 8px rgba(42, 191, 191, 0.2));
      overflow: visible;
    }

    /* Outer decorative ripple rings */
    .ring-ripple {
      fill: none;
      stroke: rgba(42, 191, 191, 0.06);
      stroke-width: 1;
    }

    .ring-ripple-1 {
      animation: ocean-ripple 6s ease-in-out infinite;
    }

    .ring-ripple-2 {
      animation: ocean-ripple 6s ease-in-out 2s infinite;
    }

    .ring-ripple-3 {
      animation: ocean-ripple 6s ease-in-out 4s infinite;
    }

    @keyframes ocean-ripple {
      0% {
        stroke-opacity: 0;
        transform: scale(0.92);
      }

      30% {
        stroke-opacity: 0.12;
      }

      100% {
        stroke-opacity: 0;
        transform: scale(1.15);
      }
    }

    /* Main track — wavy dashed circle */
    .ring-track {
      fill: none;
      stroke: rgba(42, 191, 191, 0.10);
      stroke-width: 3;
      stroke-dasharray: 8 4;
    }

    /* Inner glow ring */
    .ring-inner-glow {
      fill: none;
      stroke: rgba(42, 191, 191, 0.04);
      stroke-width: 12;
    }

    /* Progress arc */
    .ring-progress {
      fill: none;
      stroke: var(--seafoam);
      stroke-width: 3.5;
      stroke-linecap: round;
      stroke-dasharray: 8 4;
      transition: stroke-dashoffset 1s linear, stroke 0.5s;
      filter: drop-shadow(0 0 6px rgba(42, 191, 191, 0.5));
    }

    .ring-progress.break-ring {
      stroke: #5eeab0;
      filter: drop-shadow(0 0 6px rgba(94, 234, 176, 0.5));
    }

    .timer-center {
      position: absolute;
      text-align: center;
    }

    .timer-display {
      font-family: 'Cormorant Garant', serif;
      font-size: 4rem;
      font-weight: 300;
      letter-spacing: 0.05em;
      line-height: 1;
      color: var(--pearl);
      text-shadow: 0 0 30px rgba(126, 232, 232, 0.3);
      background: transparent;
      border: none;
      outline: none;
      width: 160px;
      text-align: center;
      cursor: text;
      caret-color: var(--seafoam);
    }

    .timer-display:focus {
      text-shadow: 0 0 30px rgba(126, 232, 232, 0.6);
      border-bottom: 1px solid rgba(42, 191, 191, 0.35);
    }

    .timer-label {
      font-size: 0.65rem;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: var(--teal);
      margin-top: 0.4rem;
    }

    /* Timer controls */
    .timer-controls {
      display: flex;
      gap: 0.75rem;
      justify-content: center;
      margin-bottom: 1.8rem;
    }

    .btn {
      border: none;
      cursor: pointer;
      font-family: 'DM Sans', sans-serif;
      font-weight: 500;
      letter-spacing: 0.08em;
      border-radius: 100px;
      transition: all 0.2s ease;
    }

    .btn-primary {
      background: linear-gradient(135deg, var(--teal), var(--seafoam));
      color: var(--deep);
      padding: 0.75rem 2.5rem;
      font-size: 0.85rem;
      text-transform: uppercase;
      letter-spacing: 0.15em;
      box-shadow: 0 4px 20px rgba(42, 191, 191, 0.3);
    }

    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 28px rgba(42, 191, 191, 0.45);
    }

    .btn-secondary {
      background: rgba(42, 191, 191, 0.1);
      color: var(--seafoam);
      border: 1px solid var(--glass-border);
      padding: 0.75rem 1.5rem;
      font-size: 0.85rem;
      text-transform: uppercase;
      letter-spacing: 0.12em;
    }

    .btn-secondary:hover {
      background: rgba(42, 191, 191, 0.18);
      transform: translateY(-1px);
    }

    /* Settings */
    .settings-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0.75rem;
    }

    .setting-group label {
      display: block;
      font-size: 0.68rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--teal);
      margin-bottom: 0.4rem;
    }

    .setting-group input[type="number"] {
      width: 100%;
      background: rgba(10, 40, 70, 0.6);
      border: 1px solid var(--glass-border);
      border-radius: 10px;
      padding: 0.55rem 0.85rem;
      color: var(--pearl);
      font-family: 'Cormorant Garant', serif;
      font-size: 1.3rem;
      font-weight: 300;
      text-align: center;
      outline: none;
      transition: border-color 0.2s;
    }

    .setting-group input[type="number"]:focus {
      border-color: rgba(42, 191, 191, 0.4);
      box-shadow: 0 0 0 3px rgba(42, 191, 191, 0.08);
    }

    input[type="number"]::-webkit-inner-spin-button,
    input[type="number"]::-webkit-outer-spin-button {
      opacity: 0.3;
    }

    /* Session count */
    .sessions-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-top: 1rem;
      padding-top: 1rem;
      border-top: 1px solid rgba(42, 191, 191, 0.08);
    }

    .sessions-label {
      font-size: 0.7rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--teal);
    }

    .sessions-dots {
      display: flex;
      gap: 6px;
    }

    .session-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: rgba(42, 191, 191, 0.15);
      border: 1px solid rgba(42, 191, 191, 0.25);
      transition: all 0.3s;
    }

    .session-dot.done {
      background: var(--seafoam);
      box-shadow: 0 0 8px rgba(42, 191, 191, 0.5);
    }

    /* Task list */
    .tasks-card {
      align-self: start;
    }

    .tasks-list {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 0.6rem;
    }

    .task-item {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      padding: 0.75rem 1rem;
      background: rgba(6, 24, 48, 0.5);
      border: 1px solid rgba(42, 191, 191, 0.08);
      border-radius: 12px;
      transition: all 0.25s ease;
      animation: task-slide-in 0.3s ease;
    }

    @keyframes task-slide-in {
      from {
        opacity: 0;
        transform: translateY(-8px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .task-item:hover {
      border-color: rgba(42, 191, 191, 0.2);
      background: rgba(14, 50, 80, 0.5);
    }

    .task-item.completed {
      opacity: 0.45;
    }

    /* Custom checkbox */
    .task-check {
      appearance: none;
      -webkit-appearance: none;
      width: 20px;
      height: 20px;
      border-radius: 6px;
      border: 1.5px solid rgba(42, 191, 191, 0.35);
      background: transparent;
      cursor: pointer;
      flex-shrink: 0;
      position: relative;
      transition: all 0.2s;
    }

    .task-check:checked {
      background: linear-gradient(135deg, var(--teal), var(--seafoam));
      border-color: transparent;
    }

    .task-check:checked::after {
      content: '✓';
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      color: var(--deep);
      font-size: 11px;
      font-weight: 700;
      line-height: 1;
    }

    .task-check:hover:not(:checked) {
      border-color: var(--seafoam);
      background: rgba(42, 191, 191, 0.08);
    }

    .task-input {
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      color: var(--pearl);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.9rem;
      font-weight: 300;
    }

    .task-input::placeholder {
      color: rgba(200, 232, 224, 0.25);
    }

    .task-item.completed .task-input {
      text-decoration: line-through;
      text-decoration-color: rgba(42, 191, 191, 0.4);
    }

    .btn-remove {
      background: none;
      border: none;
      cursor: pointer;
      color: rgba(42, 191, 191, 0.2);
      font-size: 1.1rem;
      line-height: 1;
      padding: 2px 4px;
      border-radius: 4px;
      transition: all 0.2s;
      flex-shrink: 0;
    }

    .btn-remove:hover {
      color: #ff6b8a;
      background: rgba(255, 107, 138, 0.1);
    }

    /* Add task button */
    .btn-add-task {
      width: 100%;
      margin-top: 0.6rem;
      padding: 0.65rem;
      background: rgba(42, 191, 191, 0.05);
      border: 1px dashed rgba(42, 191, 191, 0.2);
      border-radius: 12px;
      color: rgba(42, 191, 191, 0.5);
      font-size: 0.8rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      cursor: pointer;
      font-family: 'DM Sans', sans-serif;
      transition: all 0.2s;
    }

    .btn-add-task:hover {
      background: rgba(42, 191, 191, 0.1);
      border-color: rgba(42, 191, 191, 0.4);
      color: var(--seafoam);
    }

    /* Progress bar on tasks */
    .tasks-progress {
      margin-bottom: 1rem;
      display: flex;
      align-items: center;
      gap: 0.75rem;
    }

    .progress-bar-track {
      flex: 1;
      height: 3px;
      background: rgba(42, 191, 191, 0.1);
      border-radius: 100px;
      overflow: hidden;
    }

    .progress-bar-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--teal), var(--seafoam));
      border-radius: 100px;
      transition: width 0.4s ease;
      box-shadow: 0 0 8px rgba(42, 191, 191, 0.4);
    }

    .progress-text {
      font-size: 0.7rem;
      color: var(--teal);
      letter-spacing: 0.1em;
      white-space: nowrap;
      min-width: 32px;
      text-align: right;
    }

    /* Notification toast */
    .toast {
      position: fixed;
      bottom: 2rem;
      left: 50%;
      transform: translateX(-50%) translateY(100px);
      background: var(--glass);
      border: 1px solid var(--glass-border);
      backdrop-filter: blur(20px);
      border-radius: 100px;
      padding: 0.8rem 2rem;
      font-size: 0.85rem;
      color: var(--foam);
      letter-spacing: 0.05em;
      z-index: 1000;
      transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
      pointer-events: none;
      white-space: nowrap;
    }

    .toast.show {
      transform: translateX(-50%) translateY(0);
    }

    /* Ripple on timer finish */
    .ripple-overlay {
      position: fixed;
      inset: 0;
      z-index: 5;
      pointer-events: none;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      transition: opacity 0.3s;
    }

    .ripple-overlay.active {
      opacity: 1;
    }

    .ripple-circle {
      position: absolute;
      width: 10px;
      height: 10px;
      border-radius: 50%;
      border: 2px solid var(--seafoam);
      animation: ripple-expand 1.5s ease-out forwards;
    }

    @keyframes ripple-expand {
      to {
        transform: scale(200);
        opacity: 0;
      }
    }

    /* Responsive */
    @media (max-width: 700px) {
      .app {
        grid-template-columns: 1fr;
        padding: 1.5rem 1rem;
      }

      header {
        grid-column: 1;
      }

      .timer-display {
        font-size: 3rem;
      }

      .logo {
        font-size: 2rem;
      }
    }

    /* Music player */
    .music-player {
      position: fixed;
      top: 1.5rem;
      right: 1.5rem;
      z-index: 100;
      background: var(--glass);
      border: 1px solid var(--glass-border);
      backdrop-filter: blur(20px);
      border-radius: 20px;
      padding: 0.85rem 1rem;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
      min-width: 210px;
      transition: min-width 0.4s cubic-bezier(0.4, 0, 0.2, 1),
        padding 0.4s cubic-bezier(0.4, 0, 0.2, 1),
        border-radius 0.4s ease;
      overflow: hidden;
    }

    .music-player.minimized {
      min-width: 0;
      padding: 0.55rem 0.85rem;
      border-radius: 100px;
      cursor: pointer;
    }

    .music-header {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.6rem;
      margin-bottom: 0.75rem;
    }

    .music-player.minimized .music-header {
      margin-bottom: 0;
    }

    .music-title {
      font-size: 0.65rem;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: var(--teal);
      white-space: nowrap;
    }

    /* Wave bars animation (visible when minimized & playing) */
    .wave-bars {
      display: flex;
      align-items: flex-end;
      gap: 2px;
      height: 14px;
      opacity: 0.45;
      transition: opacity 0.3s;
      pointer-events: none;
    }

    .wave-bars.active {
      opacity: 1;
    }

    .wave-bars span {
      display: block;
      width: 3px;
      background: var(--seafoam);
      border-radius: 1px;
      transition: transform 0.3s;
    }

    .wave-bars.active span {
      animation: wave-bar 1.2s ease-in-out infinite;
    }

    .wave-bars span:nth-child(1) {
      height: 40%;
      animation-delay: 0s;
    }

    .wave-bars span:nth-child(2) {
      height: 70%;
      animation-delay: 0.15s;
    }

    .wave-bars span:nth-child(3) {
      height: 50%;
      animation-delay: 0.3s;
    }

    .wave-bars span:nth-child(4) {
      height: 80%;
      animation-delay: 0.45s;
    }

    .wave-bars span:nth-child(5) {
      height: 35%;
      animation-delay: 0.6s;
    }

    @keyframes wave-bar {

      0%,
      100% {
        transform: scaleY(0.4);
        opacity: 0.6;
      }

      50% {
        transform: scaleY(1);
        opacity: 1;
      }
    }


    /* Collapsible body */
    .music-body {
      max-height: 400px;
      opacity: 1;
      transition: max-height 0.4s cubic-bezier(0.4, 0, 0.2, 1),
        opacity 0.3s ease,
        margin-top 0.3s ease;
      overflow: hidden;
    }

    .music-player.minimized .music-body {
      max-height: 0;
      opacity: 0;
      margin-top: 0;
    }

    .track-btn.playing {
      background: rgba(42, 191, 191, 0.18);
      border-color: var(--seafoam);
      box-shadow: 0 0 12px rgba(42, 191, 191, 0.15);
    }

    .track-btn.playing .track-icon {
      animation: pulse-dot 2s ease-in-out infinite;
    }

    .track-list {
      display: flex;
      flex-direction: column;
      gap: 0.4rem;
    }

    .track-btn {
      display: flex;
      align-items: center;
      gap: 0.65rem;
      padding: 0.5rem 0.7rem;

<body>

  <div class="app">
    <header>

      <div class="music-player minimized" id="musicPlayer">
        <div class="music-header" onclick="toggleSoundscape(event)">

    <!-- TIMER CARD -->

            onblur="parseDirectEdit(this.value)" onkeydown="if(event.key==='Enter'){this.blur()}"
            onfocus="if(!isRunning)this.select()">

        <div class="setting-group">

        </div>

        <span class="sessions-label">Sessions</span>
        <div class="sessions-dots" id="sessionDots">
          <div class="session-dot"></div>

          <div class="session-dot"></div>
        </div>

    <!-- TASKS CARD -->
    <div class="card tasks-card">
      <div class="card-title">Tasks</div>

      <div class="tasks-progress">
        <div class="progress-bar-track">
          <div class="progress-bar-fill" id="progressFill" style="width:0%"></div>
        </div>
        <span class="progress-text" id="progressText">0/4</span>

      <button class="btn-add-task" onclick="addTask()">+ Add task</button>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script>
    // ─── Timer State ─────────────────────────────────────────────────────────────
    let interval = null;
    let isRunning = false;
    let isWork = true;
    let totalSec = 0;
    let remainSec = 0;
    let sessionsCompleted = 0;
    const CIRCUMFERENCE = 641;

    function getWorkSec() { return parseInt(document.getElementById('workMin').value || 25) * 60; }
    function getBreakSec() { return parseInt(document.getElementById('breakMin').value || 5) * 60; }

    function initTimer() {
      totalSec = isWork ? getWorkSec() : getBreakSec();
      remainSec = totalSec;
      renderTimer();
    }

    function settingChanged() {
      if (!isRunning) initTimer();
    }

    function renderTimer() {
      const m = Math.floor(remainSec / 60).toString().padStart(2, '0');
      const s = (remainSec % 60).toString().padStart(2, '0');
      const el = document.getElementById('timerDisplay');
      if (document.activeElement !== el) el.value = `${m}:${s}`;
      const progress = totalSec > 0 ? (totalSec - remainSec) / totalSec : 0;
      document.getElementById('ringProgress').style.strokeDashoffset = CIRCUMFERENCE * (1 - progress);
      document.title = `${m}:${s} — Tide Focus`;
    }

    function parseDirectEdit(val) {
      if (isRunning) return;
      // Accept MM:SS or plain minutes like "30"
      let m, s;
      const parts = val.split(':');
      if (parts.length === 2) {
        m = parseInt(parts[0]) || 0;
        s = parseInt(parts[1]) || 0;
      } else {
        m = parseInt(parts[0]) || 0;
        s = 0;
      }
      m = Math.min(m, 99); s = Math.min(s, 59);
      remainSec = m * 60 + s;
      totalSec = remainSec;
      renderTimer();
    }

    function toggleTimer() {
      isRunning ? pauseTimer() : startTimer();
    }

    function startTimer() {
      isRunning = true;
      document.getElementById('startBtn').textContent = 'Pause';
      interval = setInterval(tick, 1000);
    }

    function pauseTimer() {
      isRunning = false;
      document.getElementById('startBtn').textContent = 'Resume';
      clearInterval(interval);
    }

    function resetTimer() {
      clearInterval(interval);
      isRunning = false;
      isWork = true;
      document.getElementById('startBtn').textContent = 'Start';
      updatePhaseUI();
      initTimer();
    }

    function tick() {
      remainSec--;
      if (remainSec < 0) {
        timerDone();
        return;
      }
      renderTimer();
    }

    function timerDone() {
      clearInterval(interval);
      isRunning = false;

      if (isWork) {
        playTone('work');
        showToast('🌊 Work session complete — take a breath');
        showRipple();
        sessionsCompleted = Math.min(sessionsCompleted + 1, 4);
        updateSessionDots();
        isWork = false;
        updatePhaseUI();
        totalSec = getBreakSec();
        remainSec = totalSec;
      } else {
        playTone('break');
        showToast('🐚 Break over — dive back in');
        isWork = true;
        updatePhaseUI();
        totalSec = getWorkSec();
        remainSec = totalSec;
      }

      document.getElementById('startBtn').textContent = 'Start';
      renderTimer();
    }

    function updatePhaseUI() {
      const badge = document.getElementById('phaseBadge');
      const text = document.getElementById('phaseText');
      const ring = document.getElementById('ringProgress');
      if (isWork) {
        badge.className = 'phase-badge work';
        text.textContent = 'Deep Work';
        ring.classList.remove('break-ring');
      } else {
        badge.className = 'phase-badge break';
        text.textContent = 'Ocean Break';
        ring.classList.add('break-ring');
      }
    }

    function updateSessionDots() {
      const dots = document.querySelectorAll('.session-dot');
      dots.forEach((dot, i) => {
        dot.classList.toggle('done', i < sessionsCompleted);
      });
    }

    // ─── Tasks ────────────────────────────────────────────────────────────────────
    let tasks = [
      { id: 1, text: '', done: false },
    ];
    let nextId = 2;

    function renderTasks() {
      const list = document.getElementById('tasksList');
      list.innerHTML = '';
      tasks.forEach(t => {
        const li = document.createElement('li');
        li.className = 'task-item' + (t.done ? ' completed' : '');
        li.innerHTML = `
      <input type="checkbox" class="task-check" ${t.done ? 'checked' : ''} onchange="toggleTask(${t.id})">
      <input type="text" class="task-input" placeholder="What's the task?" value="${escHtml(t.text)}"
        oninput="updateTaskText(${t.id}, this.value)"
        onkeydown="taskKeydown(event, ${t.id})">
      <button class="btn-remove" onclick="removeTask(${t.id})" title="Remove task">×</button>
    `;
        list.appendChild(li);
      });
      updateProgress();
    }

    function escHtml(s) { return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;'); }

    function updateProgress() {
      const done = tasks.filter(t => t.done).length;
      const total = tasks.length;
      const pct = total > 0 ? Math.round((done / total) * 100) : 0;
      document.getElementById('progressFill').style.width = pct + '%';
      document.getElementById('progressText').textContent = `${done}/${total}`;
    }

    function addTask() {
      tasks.push({ id: nextId++, text: '', done: false });
      renderTasks();
      // Focus last input
      setTimeout(() => {
        const inputs = document.querySelectorAll('.task-input');
        if (inputs.length) inputs[inputs.length - 1].focus();
      }, 50);
    }

    function removeTask(id) {
      if (tasks.length <= 1) { showToast('Need at least one task'); return; }
      tasks = tasks.filter(t => t.id !== id);
      renderTasks();
    }

    function toggleTask(id) {
      const t = tasks.find(t => t.id === id);
      if (t) t.done = !t.done;
      renderTasks();
    }

    function updateTaskText(id, val) {
      const t = tasks.find(t => t.id === id);
      if (t) t.text = val;
      updateProgress();
    }

    function taskKeydown(e, id) {
      if (e.key === 'Enter') addTask();
      if (e.key === 'Backspace' && e.target.value === '' && tasks.length > 1) {
        removeTask(id);
        setTimeout(() => {
          const inputs = document.querySelectorAll('.task-input');
          if (inputs.length) inputs[inputs.length - 1].focus();
        }, 50);
      }
    }

    // ─── Toast ────────────────────────────────────────────────────────────────────
    let toastTimer;
    function showToast(msg) {
      const el = document.getElementById('toast');
      el.textContent = msg;
      el.classList.add('show');
      clearTimeout(toastTimer);
      toastTimer = setTimeout(() => el.classList.remove('show'), 3500);
    }

    // ─── Ripple effect ────────────────────────────────────────────────────────────
    function showRipple() {
      const el = document.getElementById('ripple');
      el.innerHTML = '<div class="ripple-circle"></div>';
      el.classList.add('active');
      setTimeout(() => el.classList.remove('active'), 1600);
    }

    // ─── Particles ────────────────────────────────────────────────────────────────
    function createParticles() {
      const container = document.getElementById('particles');
      for (let i = 0; i < 18; i++) {
        const p = document.createElement('div');
        p.className = 'particle';
        const size = Math.random() * 4 + 1;
        p.style.cssText = `
      left: ${Math.random() * 100}%;
      width: ${size}px;
      height: ${size}px;
      animation-duration: ${Math.random() * 18 + 14}s;
      animation-delay: ${Math.random() * 20}s;
      filter: blur(${Math.random() > 0.7 ? 1 : 0}px);
      opacity: ${Math.random() * 0.5};
    `;
        container.appendChild(p);
      }
    }

    // ─── Audio Engine ─────────────────────────────────────────────────────────────
    let sharedCtx = null;
    function getCtx() {
      if (!sharedCtx) sharedCtx = new (window.AudioContext || window.webkitAudioContext)();
      if (sharedCtx.state === 'suspended') sharedCtx.resume();
      return sharedCtx;
    }

    function makePinkNoiseBuffer(ac) {
      const len = ac.sampleRate * 4;
      const buf = ac.createBuffer(2, len, ac.sampleRate);
      for (let c = 0; c < 2; c++) {
        const d = buf.getChannelData(c);
        let b0 = 0, b1 = 0, b2 = 0, b3 = 0, b4 = 0, b5 = 0, b6 = 0;
        for (let i = 0; i < len; i++) {
          const w = Math.random() * 2 - 1;
          b0 = 0.99886 * b0 + w * 0.0555179; b1 = 0.99332 * b1 + w * 0.0750759;
          b2 = 0.96900 * b2 + w * 0.1538520; b3 = 0.86650 * b3 + w * 0.3104856;
          b4 = 0.55000 * b4 + w * 0.5329522; b5 = -0.7616 * b5 - w * 0.0168980;
          d[i] = (b0 + b1 + b2 + b3 + b4 + b5 + b6 + w * 0.5362) / 7; b6 = w * 0.115926;
        }
      }
      return buf;
    }

    // ── Bell tones for pomodoro alerts ──
    function playTone(type) {
      const ac = getCtx();
      const seq = type === 'work'
        ? [[528, 0], [440, .25], [396, .5], [264, .85]]
        : [[330, 0], [440, .2], [528, .4], [660, .65]];
      seq.forEach(([freq, delay]) => {
        const osc = ac.createOscillator(), g = ac.createGain(), now = ac.currentTime + delay;
        osc.connect(g); g.connect(ac.destination);
        osc.type = 'sine'; osc.frequency.value = freq;
        g.gain.setValueAtTime(0, now);
        g.gain.linearRampToValueAtTime(0.18, now + 0.04);
        g.gain.exponentialRampToValueAtTime(0.001, now + 1.8);
        osc.start(now); osc.stop(now + 2);
      });
    }

    // ─── Multi-track Soundscape ───────────────────────────────────────────────────
    // tracks: 0=youtube  1=ocean  2=brown  3=gamma  4=limitless
    let currentTrack = 0;
    let isPlaying = false;
    let activeNodes = [];
    let masterGainNode = null;

    // ── YouTube (track 0) ──
    let ytPlayer = null, ytReady = false;
    const ytScript = document.createElement('script');
    ytScript.src = 'https://www.youtube.com/iframe_api';
    document.head.appendChild(ytScript);
    function onYouTubeIframeAPIReady() {
      ytPlayer = new YT.Player('yt-player', {
        videoId: '4MFOBeUCPkw',
        playerVars: { autoplay: 0, loop: 1, playlist: '4MFOBeUCPkw', controls: 0, disablekb: 1, fs: 0 },
        events: { onReady: e => { ytReady = true; e.target.setVolume(getVolPct()); } }
      });
    }

    // ── Ocean waves (track 1) ──
    function buildOcean(ac, master) {
      const buf = makePinkNoiseBuffer(ac);
      const all = [];

      function layer(loopStart, fType, fFreq, fQ, baseGain, lfoHz, lfoDepth) {
        const src = ac.createBufferSource();
        src.buffer = buf; src.loop = true; src.loopStart = loopStart;
        const filt = ac.createBiquadFilter();
        filt.type = fType; filt.frequency.value = fFreq; filt.Q.value = fQ;
        const g = ac.createGain(); g.gain.value = baseGain;
        src.connect(filt); filt.connect(g); g.connect(master); src.start(); all.push(src);
        if (lfoHz) {
          const lfo = ac.createOscillator(), lg = ac.createGain();
          lfo.frequency.value = lfoHz; lg.gain.value = lfoDepth;
          lfo.connect(lg); lg.connect(g.gain); lfo.start(); all.push(lfo);
        }
      }

      layer(0, 'lowpass', 180, 0.8, 0.5, null, 0);
      layer(0.5, 'bandpass', 600, 0.6, 0.35, 0.13, 0.3);
      layer(1.2, 'highpass', 2800, 0.5, 0.08, 0.09, 0.06);
      layer(2.0, 'lowpass', 80, 1.2, 0.18, 0.07, 0.15);

      return { stop: () => all.forEach(n => { try { n.stop(); } catch (e) { } }) };
    }

    // ── Brown noise (track 2) ──
    function buildBrown(ac, master) {
      const len = ac.sampleRate * 4;
      const buf = ac.createBuffer(2, len, ac.sampleRate);
      for (let c = 0; c < 2; c++) {
        const d = buf.getChannelData(c); let last = 0;
        for (let i = 0; i < len; i++) {
          last = (last + 0.02 * (Math.random() * 2 - 1)) / 1.02;
          d[i] = Math.max(-1, Math.min(1, last * 3.0));
        }
      }
      const src = ac.createBufferSource(); src.buffer = buf; src.loop = true;
      const lp = ac.createBiquadFilter(); lp.type = 'lowpass'; lp.frequency.value = 500; lp.Q.value = 0.5;
      const g = ac.createGain(); g.gain.value = 0.9;
      src.connect(lp); lp.connect(g); g.connect(master); src.start();
      return { stop: () => { try { src.stop(); } catch (e) { } } };
    }

    // ── Gamma 40Hz isochronic (track 3) ──
    function buildGamma(ac, master) {
      const nodes = [];

      function makeIsochronic(carrierFreq, panVal) {
        const osc = ac.createOscillator();
        osc.type = 'sine'; osc.frequency.value = carrierFreq;
        // AM: base=0.5, mod depth=0.5 → gain sweeps [0..1], stays positive
        const ampGain = ac.createGain(); ampGain.gain.value = 0.5;
        const modOsc = ac.createOscillator();
        modOsc.type = 'sine'; modOsc.frequency.value = 40;
        const modDepth = ac.createGain(); modDepth.gain.value = 0.5;
        modOsc.connect(modDepth); modDepth.connect(ampGain.gain);
        const pan = ac.createStereoPanner(); pan.pan.value = panVal;
        osc.connect(ampGain); ampGain.connect(pan); pan.connect(master);
        osc.start(); modOsc.start();
        nodes.push(osc, modOsc);
      }

      makeIsochronic(200, -1);  // 200Hz left
      makeIsochronic(240, 1);  // 240Hz right → 40Hz binaural beat

      // Soft pink noise bed
      const nb = makePinkNoiseBuffer(ac);
      const ns = ac.createBufferSource(); ns.buffer = nb; ns.loop = true;
      const nlp = ac.createBiquadFilter(); nlp.type = 'lowpass'; nlp.frequency.value = 800;
      const ng = ac.createGain(); ng.gain.value = 0.04;
      ns.connect(nlp); nlp.connect(ng); ng.connect(master); ns.start();
      nodes.push(ns);

      return { stop: () => nodes.forEach(n => { try { n.stop(); } catch (e) { } }) };
    }

    // ── Limitless: generative ambient music (track 4) ──
    function buildLimitless(ac, master) {
      const nodes = [];
      let schedulerTimer = null;

      // Simple feedback delay for warmth/space
      const delayNode = ac.createDelay(2.0); delayNode.delayTime.value = 0.45;
      const fbGain = ac.createGain(); fbGain.gain.value = 0.38;
      const delayLp = ac.createBiquadFilter(); delayLp.type = 'lowpass'; delayLp.frequency.value = 1800;
      const wetGain = ac.createGain(); wetGain.gain.value = 0.28;
      delayNode.connect(delayLp); delayLp.connect(fbGain); fbGain.connect(delayNode);
      delayNode.connect(wetGain); wetGain.connect(master);

      // C pentatonic: C D E G A across 3 octaves
      const penta = [
        65.41, 73.42, 82.41, 98.00, 110.00,
        130.81, 146.83, 164.81, 196.00, 220.00,
        261.63, 293.66, 329.63, 392.00, 440.00
      ];

      // Chord voicings (indices into penta)
      const chords = [
        [0, 4, 7], [2, 5, 9], [1, 4, 8], [3, 6, 9], [0, 3, 7], [4, 7, 10], [2, 6, 9]
      ];

      function softNote(freq, dur, when, vol = 0.07, wave = 'sine') {
        const osc = ac.createOscillator(), g = ac.createGain();
        osc.type = wave; osc.frequency.value = freq;
        const atk = Math.min(dur * 0.2, 1.5), rel = Math.min(dur * 0.4, 2.5);
        g.gain.setValueAtTime(0, when);
        g.gain.linearRampToValueAtTime(vol, when + atk);
        g.gain.setValueAtTime(vol, when + dur - rel);
        g.gain.linearRampToValueAtTime(0, when + dur);
        osc.connect(g);
        g.connect(master);
        g.connect(delayNode);
        osc.start(when); osc.stop(when + dur + 0.05);
        nodes.push(osc);
      }

      let nextBeat = ac.currentTime + 0.2;

      function schedule() {
        const lookahead = 4.0; // schedule 4s ahead
        while (nextBeat < ac.currentTime + lookahead) {
          const chord = chords[Math.floor(Math.random() * chords.length)];
          const chordDur = 5 + Math.random() * 6;

          // Pad voices
          chord.forEach((idx, i) => {
            if (idx < penta.length) {
              softNote(penta[idx], chordDur, nextBeat + i * 0.08, 0.055 + Math.random() * 0.02, 'sine');
            }
          });

          // Occasional high melody note
          if (Math.random() > 0.35) {
            const hiIdx = 10 + Math.floor(Math.random() * 5);
            const melDelay = 1 + Math.random() * (chordDur * 0.5);
            softNote(penta[hiIdx], 2 + Math.random() * 2, nextBeat + melDelay, 0.035, 'sine');
          }

          // Rare bass pulse
          if (Math.random() > 0.55) {
            softNote(penta[chord[0]] * 0.5, 3 + Math.random() * 2, nextBeat, 0.07, 'sine');
          }

          nextBeat += chordDur * 0.65 + Math.random() * 2;
        }

        schedulerTimer = setTimeout(schedule, 2000);
      }

      schedule();

      return {
        stop: () => {
          clearTimeout(schedulerTimer);
          nodes.forEach(n => { try { n.stop(); } catch (e) { } });
        }
      };
    }

    // ─── Player Controls ──────────────────────────────────────────────────────────
    function getVolPct() { return parseInt(document.getElementById('volSlider').value); }

    function startCurrentTrack() {
      const ac = getCtx();
      masterGainNode = ac.createGain();
      masterGainNode.gain.setValueAtTime(0, ac.currentTime);
      masterGainNode.gain.linearRampToValueAtTime(getVolPct() / 100 * 0.75, ac.currentTime + 1.5);
      masterGainNode.connect(ac.destination);

      if (currentTrack === 0) {
        if (ytReady) { ytPlayer.setVolume(getVolPct()); ytPlayer.playVideo(); }
        else showToast('YouTube loading… try again in a moment');
      } else if (currentTrack === 1) {
        activeNodes.push(buildOcean(ac, masterGainNode));
      } else if (currentTrack === 2) {
        activeNodes.push(buildBrown(ac, masterGainNode));
      } else if (currentTrack === 3) {
        activeNodes.push(buildGamma(ac, masterGainNode));
      } else if (currentTrack === 4) {
        // Limitless: play the YouTube video at a random point
        if (ytReady) {
          const duration = ytPlayer.getDuration() || 3600;
          const randomTime = Math.floor(Math.random() * (duration - 60));
          ytPlayer.setVolume(getVolPct());
          ytPlayer.seekTo(randomTime, true);
          ytPlayer.playVideo();
        } else {
          showToast('YouTube loading… try again in a moment');
        }
      }
    }

    function stopCurrentTrack(instant) {
      if ((currentTrack === 0 || currentTrack === 4) && ytReady && ytPlayer) ytPlayer.pauseVideo();
      if (masterGainNode && !instant) {
        const ac = getCtx();
        masterGainNode.gain.linearRampToValueAtTime(0, ac.currentTime + 1.2);
        const captured = [...activeNodes];
        setTimeout(() => { captured.forEach(n => n.stop()); }, 1350);
      } else {
        activeNodes.forEach(n => n.stop());
      }
      activeNodes = [];
      masterGainNode = null;
    }

    function selectTrack(idx) {
      // Clicking the already-playing track stops it
      if (isPlaying && currentTrack === idx) {
        stopCurrentTrack(false);
        isPlaying = false;
        updateTrackUI(-1);
        updateWaveBars();
        return;
      }
      // Remember if we need a cross-fade delay
      const wasBusy = isPlaying;
      if (wasBusy) stopCurrentTrack(false);
      isPlaying = false;
      currentTrack = idx;
      updateTrackUI(idx);

      const delay = wasBusy ? 1400 : 50;
      setTimeout(() => {
        startCurrentTrack();
        isPlaying = true;
        updateWaveBars();
      }, delay);
    }

    function updateTrackUI(activeIdx) {
      document.querySelectorAll('.track-btn').forEach((b, i) => {
        b.classList.toggle('playing', i === activeIdx);
      });
    }

    // ─── Soundscape expand / collapse ────────────────────────────────────────────
    function toggleSoundscape(e) {
      const player = document.getElementById('musicPlayer');
      player.classList.toggle('minimized');
      updateWaveBars();
    }

    function updateWaveBars() {
      const bars = document.getElementById('waveBars');
      bars.classList.toggle('active', isPlaying);
    }

    function setVolume(val) {
      const v = parseInt(val) / 100;
      if (masterGainNode) {
        const ac = getCtx();
        masterGainNode.gain.linearRampToValueAtTime(v * 0.75, ac.currentTime + 0.1);
      }
      if ((currentTrack === 0 || currentTrack === 4) && ytReady && ytPlayer) ytPlayer.setVolume(parseInt(val));
    }
    createParticles();
    initTimer();
    renderTasks();
  </script>
</body>
